        const levenshteinDistance = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        };

                      for (let i = 0; i < bufferSize; i++) {
                          output[i] = (Math.random() * 2 - 1) * 0.15; // Ruido blanco a bajo volumen
                      }
                  };
                  const gainNode = ctx.createGain();
                  gainNode.gain.value = 0.08; // Volumen muy bajo
                  noiseGainRef.current = gainNode;

                  s = s.replace(/[\u{1F000}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{2B50}]|\u{FE0F}/gu, '');

                  let isDiff = false;
                  if (text.startsWith('1')) { isDiff = true; text = text.replace(/^1[.\-):\]]*\s*/, '').trim(); }
                  text = text.replace(/^[-*•+>]\s*/, '').trim();
                  text = text.replace(/^\d+[.\-):\]]+\s*/, '').trim();
                  let de = ""; let es = "";
                  const match = text.match(/(\s+-\s+|\s+=\s+|\t|\s{2,}|={1,})/);
                  if (match) {
                      const sepIndex = text.indexOf(match[0]);
                      de = cleanStr(text.substring(0, sepIndex));
                      es = cleanStr(text.substring(sepIndex + match[0].length));
                  } else {
                      const hyphenMatch = text.match(/(^|\s)-(?!\w)|(?<!\w)-(\s|$)/);
                      if (hyphenMatch) {
                          const sepIndex = text.indexOf(hyphenMatch[0]);
                          de = cleanStr(text.substring(0, sepIndex));
                          es = cleanStr(text.substring(sepIndex + hyphenMatch[0].length));

                          let words = text.split(' ');

                          de = cleanStr(words.slice(0, splitPoint).join(' '));
                          es = cleanStr(words.slice(splitPoint).join(' '));
                          if (!es) es = "???";
                      }
                  }
                  de = de.replace(/^1[.\-):\]]*\s*/, '').trim();
                  es = es.replace(/^1[.\-):\]]*\s*/, '').trim();
                  if (de) parsedWords.push({ de, es, diff: isDiff ? 1 : 0 });

                      context.strokeStyle = '#ffffff';
                      context.lineWidth = 4;
                      setCtx(context);
                      const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
                      resize();
                      window.addEventListener('resize', resize);
                      return () => window.removeEventListener('resize', resize);
                  }
              }, []);

              const getCoordinates = (e) => {
                  const canvas = canvasRef.current;
                  const rect = canvas.getBoundingClientRect();
                  let clientX, clientY;
                  if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                  else { clientX = e.clientX; clientY = e.clientY; }
                  return { offsetX: clientX - rect.left, offsetY: clientY - rect.top };
              };
              const clearCanvas = () => { ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); };
              const saveDrawing = () => {
                  const canvas = canvasRef.current;
                  const image = canvas.toDataURL('image/png');

// -------------------- DATOS DE RESPALDO --------------------
const DEFAULT_PLURALS = [
    { singular: "der Tisch", plural: "die Tische", regla: "+e" },
    { singular: "die Lampe", plural: "die Lampen", regla: "+n" },
    { singular: "das Buch", plural: "die Bücher", regla: "¨+er" }
];
const DEFAULT_VERBPREP = [
    { verbo: "warten", preposicion: "auf", ejemplo: "Ich warte auf den Bus." },
    { verbo: "sich interessieren", preposicion: "für", ejemplo: "Ich interessiere mich für Kunst." },
    { verbo: "denken", preposicion: "an", ejemplo: "Ich denke an dich." }
];
const DEFAULT_PREPOSITIONS = [
    { preposicion: "aus", caso: "Dativ", ejemplo: "Ich komme aus Spanien." },
    { preposicion: "für", caso: "Akkusativ", ejemplo: "Das Geschenk ist für dich." },
    { preposicion: "in", caso: "Wechsel", ejemplo: "Ich bin in der Stadt (Dativ) / Ich gehe in die Stadt (Akkusativ)." }
];

// -------------------- EXTRACTORES (guardan en localStorage) --------------------
function extractPluralsFromGuion(guionData, scriptTitle) {
    if (!guionData || !Array.isArray(guionData)) return;
    let existing = JSON.parse(localStorage.getItem('muller_extracted_plurals') || '[]');
    guionData.forEach(scene => {
        const text = scene.text;
        const matches = text.match(/\bdie\s+([A-ZÄÖÜ][a-zäöüß]+(?:e|er|en|n|s)?)\b/g) || [];
        matches.forEach(m => {
            const plural = m.replace('die ', '');
            let singular = plural.replace(/[äöü]/g, c => ({'ä':'a','ö':'o','ü':'u'}[c]));
            singular = singular.replace(/(e|er|n|en|s)$/, '');
            if (singular && !existing.find(p => p.plural === plural)) {
                existing.push({ singular, plural, example: text, scriptTitle, regla: 'extraído' });
            }
        });
    });
    localStorage.setItem('muller_extracted_plurals', JSON.stringify(existing));
}

function extractVerbPrepsFromGuion(guionData, scriptTitle) {
    let existing = JSON.parse(localStorage.getItem('muller_extracted_verbprep') || '[]');
    const patterns = DEFAULT_VERBPREP.map(v => ({ verbo: v.verbo, prep: v.preposicion }));
    guionData.forEach(scene => {
        const text = scene.text;
        patterns.forEach(p => {
            if (text.includes(p.verbo) && text.includes(p.prep)) {
                if (!existing.find(v => v.verbo === p.verbo)) {
                    existing.push({ ...p, ejemplo: text, scriptTitle });
                }
            }
        });
    });
    localStorage.setItem('muller_extracted_verbprep', JSON.stringify(existing));
}

function extractPrepositionsFromGuion(guionData, scriptTitle) {
    let existing = JSON.parse(localStorage.getItem('muller_extracted_prepositions') || '[]');
    guionData.forEach(scene => {
        const text = scene.text;
        DEFAULT_PREPOSITIONS.forEach(p => {
            if (text.includes(p.preposicion)) {
                if (!existing.find(pr => pr.preposicion === p.preposicion)) {
                    existing.push({ ...p, example: text, scriptTitle });
                }
            }
        });
    });
    localStorage.setItem('muller_extracted_prepositions', JSON.stringify(existing));
}

function extractArticlesFromGuionFinal(guionData, scriptTitle) {
    if (!guionData || !Array.isArray(guionData)) return;
    const corrections = JSON.parse(localStorage.getItem('muller_article_corrections') || '{}');
    let existing = JSON.parse(localStorage.getItem('muller_extracted_articles') || '[]');
    const regex = /\b(Der|Die|Das|Ein|Eine)\s+([A-ZÄÖÜ][a-zäöüß]+)\s+(ist|sind|hat|haben|kann|muss|will|möchte|kommt|geht|steht|liegt|sitzt|arbeitet|spricht|denkt|findet|glaubt|weiß|sieht|hört|fährt|läuft|bringt|nimmt|gibt|hilft|trifft|schläft|wäscht|trägt|verliert|schreibt|liest|kennt|nennt)\b/gi;
    guionData.forEach(scene => {
        const text = scene.text || '';
        let match;
        while ((match = regex.exec(text)) !== null) {
            const articleRaw = match[1].toLowerCase();
            const noun = match[2];
            let finalArticle = corrections[noun];
            if (!finalArticle) {
                const found = existing.find(item => item.word === noun);
                if (found) finalArticle = found.article;
            }
            if (!finalArticle) {
                if (noun.toLowerCase().endsWith('ung') || noun.toLowerCase().endsWith('heit') || noun.toLowerCase().endsWith('keit')) finalArticle = 'die';
                else if (noun.toLowerCase().endsWith('chen') || noun.toLowerCase().endsWith('lein')) finalArticle = 'das';
                else if (noun.toLowerCase().endsWith('er') || noun.toLowerCase().endsWith('ling')) finalArticle = 'der';
                else finalArticle = articleRaw === 'ein' ? 'der' : articleRaw === 'eine' ? 'die' : articleRaw;
            }
            if (finalArticle && noun.length > 1 && !existing.find(item => item.word === noun)) {
                existing.push({
                    word: noun, article: finalArticle,
                    examples: [text], translation: scene.translation || '',
                    scriptTitle, dateAdded: new Date().toISOString(),
                    inferred: !corrections[noun]
                });
            }
        }
    });
    localStorage.setItem('muller_extracted_articles', JSON.stringify(existing));
}

function ArticlePracticeFinal({ onBack }) {
    const [vocab, setVocab] = React.useState([]);
    const [index, setIndex] = React.useState(0);
    const [feedback, setFeedback] = React.useState(null);

    React.useEffect(() => {
        // Extraer sustantivos del guion actual o base de datos
        const allVocab = window.__DEFAULT_GUION__?.flatMap(s => s.vocab || []) || [];
        const nouns = allVocab.filter(v => v.de.startsWith('der ') || v.de.startsWith('die ') || v.de.startsWith('das '));
        // Mezclar aleatoriamente
        setVocab(nouns.sort(() => Math.random() - 0.5));
    }, []);

    const check = (article) => {
        const current = vocab[index];
        const correctArticle = current.de.split(' ')[0].toLowerCase();
        
        if (article === correctArticle) {
            setFeedback(`¡Correcto! Es ${current.de}`);
            setTimeout(() => {
                setFeedback(null);
                setIndex((prev) => (prev + 1) % vocab.length);
            }, 1000);
        } else {
            setFeedback(`⚠️ PELIGRO: Has fallado. Lo correcto es ${current.de}`);
        }
    };

    if (vocab.length === 0) return <div className="text-center mt-10">Cargando vocabulario...</div>;

    const current = vocab[index];
    const wordWithoutArticle = current.de.split(' ').slice(1).join(' ');

    return (
        <div className="flex flex-col items-center justify-center p-4 animate-in fade-in h-full">
            <button onClick={onBack} className="absolute top-4 left-4 bg-gray-800 p-2 rounded text-gray-300 hover:text-white">⬅ Volver a Carpetas</button>

                <h3 className="text-4xl font-bold text-white mb-2">{wordWithoutArticle}</h3>
                <p className="text-gray-400 mb-8 text-lg">{current.es}</p>
                
                {!feedback ? (
                    <div className="flex gap-4 justify-center">
                        <button onClick={() => check('der')} className="bg-blue-600 hover:bg-blue-500 px-6 py-4 rounded-xl font-bold text-2xl transition">🔵 DER</button>
                        <button onClick={() => check('die')} className="bg-red-600 hover:bg-red-500 px-6 py-4 rounded-xl font-bold text-2xl transition">🔴 DIE</button>
                        <button onClick={() => check('das')} className="bg-green-600 hover:bg-green-500 px-6 py-4 rounded-xl font-bold text-2xl transition">🟢 DAS</button>
                    </div>
                ) : (
                    <div className={`p-4 rounded-xl font-bold text-xl animate-in zoom-in ${feedback.includes('PELIGRO') ? 'bg-red-900/80 text-red-200' : 'bg-green-900/80 text-green-200'}`}>

                )}
                
                <p className="text-gray-500 text-sm mt-8">Tarjeta {index + 1} de {vocab.length}</p>
            </div>
        </div>
    );

// -------------------- IMPLEMENTACIÓN DEL MODO AUDIOLIBRO (REAL) --------------------
(function() {
    let isPlaying = false;
    let currentIdx = 0;
    let guionCache = null;
    let timeoutId = null;
    let btnRef = null;

    function getCurrentGuion() {
        // Prioridad: guion activo en la interfaz (si se puede obtener)
        // Si no, el último guardado o el por defecto
        const scripts = JSON.parse(localStorage.getItem('mullerScripts') || '[]');
        if (scripts.length > 0) {
            const last = scripts[scripts.length - 1];
            try { return JSON.parse(last.data); } catch(e) {}
        }
        return window.__DEFAULT_GUION__ || [];
    }

    function stopAudioBook() {
        if (timeoutId) clearTimeout(timeoutId);
        window.speechSynthesis.cancel();
        isPlaying = false;
        if (btnRef) {
            btnRef.style.backgroundColor = '#d97706';
            btnRef.innerHTML = '<i data-lucide="headphones" class="w-5 h-5"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    }

    function playScene(index) {
        if (!guionCache || index >= guionCache.length) {
            stopAudioBook();
            alert('📖 Audiolibro finalizado');
            return;
        }
        const scene = guionCache[index];
        const utterance = new SpeechSynthesisUtterance(scene.text);
        utterance.lang = 'de-DE';
        utterance.rate = 0.9;
        utterance.onend = () => {
            timeoutId = setTimeout(() => {
                playScene(index + 1);
            }, 800);
        };
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
        currentIdx = index;
    }

    function startAudioBook() {
        guionCache = getCurrentGuion();
        if (!guionCache || guionCache.length === 0) {
            alert('No hay ningún guion cargado.');
            return;
        }
        stopAudioBook();
        isPlaying = true;
        playScene(0);
        if (btnRef) {
            btnRef.style.backgroundColor = '#ef4444';
            btnRef.innerHTML = '<i data-lucide="square" class="w-5 h-5"></i>';
            if (window.lucide) window.lucide.createIcons();
        }
    }

    // Esperar a que el botón naranja exista y asignarle la función
    const waitForOrangeBtn = setInterval(() => {
        const orangeBtn = document.querySelector('.bg-amber-600.hover\\:bg-amber-500.text-white.p-2.rounded-full');
        if (orangeBtn && !orangeBtn.hasAttribute('data-audiobook-ready')) {
            orangeBtn.setAttribute('data-audiobook-ready', 'true');
            btnRef = orangeBtn;
            orangeBtn.onclick = (e) => {
                e.stopPropagation();
                if (isPlaying) stopAudioBook();
                else startAudioBook();
            };
            clearInterval(waitForOrangeBtn);
        }
    }, 500);
})();
