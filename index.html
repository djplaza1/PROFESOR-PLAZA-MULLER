        /* ==================== SPLASH / PREBOOT - REDISEÑO ==================== */
        .muller-preboot {
            position: fixed;
            inset: 0;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            background: #ffffff;
            transition: opacity 280ms ease, visibility 280ms ease;
        }
        .muller-preboot.is-hidden {
            opacity: 0;
            pointer-events: none;
            visibility: hidden;
        }

        /* ---- BANDA ALEMANA ARRIBA ---- */
        .muller-preboot-de {
            flex: 1 1 22%;
            width: 100%;
            min-height: 70px;
            max-height: 30vh;
            position: relative;
            z-index: 1;
            margin: 0;
            /* Negro (0-33.3%), Rojo (33.3-66.6%), Oro (66.6-100%) */
            background: linear-gradient(
                180deg,
                #000000 0%, #000000 33.3%,
                #dd0000 33.3%, #dd0000 66.6%,
                #ffce00 66.6%, #ffce00 100%
            );
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
            /* Pequeña línea clara en la parte superior para que el negro se distinga sobre fondo oscuro */
            border-top: 1px solid rgba(255,255,255,0.08);
        }

        /* ---- BANDA ESPAÑOLA ABAJO ---- */
        .muller-preboot-es {
            flex: 1 1 22%;
            width: 100%;
            min-height: 70px;
            max-height: 30vh;
            position: relative;
            z-index: 1;
            margin: 0;
            background: linear-gradient(
                180deg,
                #aa151b 0%, #aa151b 33.3%,
                #f1bf00 33.3%, #f1bf00 66.6%,
                #aa151b 66.6%, #aa151b 100%
            );
            box-shadow: 0 -2px 12px rgba(0,0,0,0.15);
        }

        /* ---- ZONA CENTRAL: LOGO IZQUIERDA + TÍTULO + CTA DERECHA SOBRE FONDO NEGRO ---- */
        .muller-preboot-mid {
            flex: 1 1 56%;
            display: flex;
            flex-direction: row;
            align-items: stretch;
            justify-content: center;
            width: 100%;
            max-width: 100vw;
            position: relative;
            z-index: 2;
            overflow: hidden;
            padding: 0;
            background: #000000;
            box-sizing: border-box;
        }

        /* Lado izquierdo: fondo negro + logo */
        .muller-preboot-mid-left {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #000000;
            padding: clamp(0.75rem, 2vw, 1.5rem);
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Logo sobre fondo negro */
        .muller-preboot-logo-btn {
            -webkit-tap-highlight-color: transparent;
            display: block;
            margin: 0 auto;
            padding: 0;
            border: none;
            cursor: pointer;
            background: none !important;
            border-radius: 0;
            box-shadow: none !important;
            line-height: 0;
            transition: transform 180ms ease, opacity 180ms ease;
            position: relative;
            z-index: 3;
        }
        .muller-preboot-logo-btn:hover {
            transform: scale(1.02);
        }
        .muller-preboot-logo-btn:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 3px;
            border-radius: 0.25rem;
        }
        .muller-preboot-logo-btn img {
            display: block;
            width: min(30vw, 22vh, 12rem);
            max-width: 12rem;
            height: auto;
            aspect-ratio: 1 / 1;
            object-fit: contain;
            background: transparent !important;
            border: 0;
            box-shadow: none;
            filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.4));
            transition: filter 0.4s ease, transform 0.4s ease;
        }

        /* Lado derecho: fondo blanco con título + CTA */
        .muller-preboot-mid-right {
            flex: 1 1 auto;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            background: #ffffff;
            padding: clamp(1rem, 3vw, 2rem);
            box-sizing: border-box;
        }
        /* Título enorme, negro, sin espaciado extra */
        .muller-preboot-title {
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: clamp(2rem, 9vw, 4.5rem);
            font-weight: 800;
            line-height: 1.05;
            color: #000000;
            margin: 0;
            padding: 0;
            letter-spacing: 0;
            text-shadow: none;
            text-align: left;
            word-break: keep-all;
            white-space: nowrap;
        }
        /* CTA: flecha ← + "PULSE AQUÍ" debajo del título */
        .muller-preboot-hint {
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            gap: 0.35rem;
            opacity: 0;
            transform: translateY(-6px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            pointer-events: none;
            margin-top: 0.3rem;
        }
        .muller-preboot-hint--visible {
            opacity: 1;
            transform: translateY(0);
        }
        .muller-preboot-hint-arrow {
            display: inline-block;
            font-size: clamp(1.8rem, 5vw, 3rem);
            line-height: 1;
            color: #b45309;
            animation: prebootArrowBounce 1s ease-in-out infinite;
        }
        @keyframes prebootArrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-6px); }
        }
        .muller-preboot-hint-text {
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: clamp(1.1rem, 3.5vw, 1.6rem);
            font-weight: 800;
            letter-spacing: 0.06em;
            text-align: left;
            line-height: 1.2;
            background: linear-gradient(90deg, #a16207, #d97706, #eab308, #b45309);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }

        /* ---- ANIMACIONES tras 3 segundos ---- */
        /* Logo: destello dorado parpadeante más luminoso */
        .muller-preboot-logo-btn.preboot-logo-blink img {
            animation: golden-blink 0.8s ease-in-out infinite;
        }
        @keyframes golden-blink {
            0%, 100% {
                filter: drop-shadow(0 0 14px rgba(212, 175, 55, 0.3)) brightness(1);
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 40px gold) brightness(1.25);
                transform: scale(1.04);
            }
        }

        @media (max-width: 640px) {
            .muller-preboot-mid { flex-direction: column; }
            .muller-preboot-mid-left,
            .muller-preboot-mid-right { flex: none; width: 100%; }
            .muller-preboot-mid-left { min-height: 35%; }
            .muller-preboot-mid-right { min-height: auto; padding: 1rem; align-items: center; }
            .muller-preboot-mid-right .muller-preboot-title { text-align: center; white-space: normal; }
            .muller-preboot-mid-right .muller-preboot-hint { justify-content: center; }
            .muller-preboot-logo-btn img { width: min(40vw, 18vh, 9rem); max-width: 9rem; }
        }
        @media (max-width: 480px) {
            .muller-preboot-de { min-height: 50px; }
            .muller-preboot-es { min-height: 50px; }
            .muller-preboot-title { font-size: clamp(1.4rem, 7vw, 2.2rem); }
            .muller-preboot-hint-text { font-size: clamp(0.9rem, 4vw, 1.2rem); }
        }
        @media (min-width: 768px) {
            .muller-preboot-logo-btn img { width: min(18vw, 24vh, 12rem); max-width: 12rem; }
            .muller-preboot-title { font-size: clamp(2.2rem, 7vw, 4.5rem); }
        }
    </style>
</head>
<body>
    <div id="muller-preboot" class="muller-preboot" role="dialog" aria-modal="true" aria-label="Pantalla de inicio">
        <!-- BANDERA ALEMANA (ARRIBA) -->
        <div class="muller-preboot-de" aria-hidden="true" title="Bandera de Alemania"></div>
        
        <!-- ZONA CENTRAL: LADO IZQUIERDO (LOGO FONDO NEGRO) + LADO DERECHO (CARD BLANCA CON BORDE NEGRO) -->
        <div class="muller-preboot-mid">
            <div class="muller-preboot-mid-left">
                <button type="button" id="muller-preboot-logo-btn" class="muller-preboot-logo-btn" title="Pulse aquí para entrar" aria-label="Pulse en el logo para abrir la aplicación">
                    <img src="icons/Logo-Plaza-Sin-fondo_20250125_054126_0000.png" alt="Profesor Plaza Müller" width="600" height="600" loading="eager" fetchpriority="high" decoding="async" />
                </button>
            </div>
            <div id="muller-preboot-mid-right" class="muller-preboot-mid-right">
                <div class="muller-preboot-title">PROFESOR PLAZA MÜLLER</div>
                <div id="muller-preboot-hint" class="muller-preboot-hint" role="status" aria-live="polite" aria-hidden="true">
                    <span class="muller-preboot-hint-arrow" aria-hidden="true">←</span>
                    <span class="muller-preboot-hint-text">PULSE AQUÍ</span>
                </div>
            </div>
        </div>
        
        <!-- BANDERA ESPAÑOLA (ABAJO) IGUAL QUE ANTES -->
        <div class="muller-preboot-es" aria-hidden="true" title="Bandera de España"></div>
    </div>
    <div id="root"></div>

    <script>
    (function () {
        var hintTid;
        function dismissPreboot() {
            if (typeof window.mullerDismissPreboot === 'function') {
                try { window.mullerDismissPreboot(); } catch (e) {}
                return;
            }
            var el = document.getElementById('muller-preboot');
            if (!el) return;
            el.classList.add('is-hidden');
            window.setTimeout(function () {
                try { if (el && el.parentNode) el.parentNode.removeChild(el); } catch (e) {}
            }, 320);
        }
        function setupPreboot() {
            var btn = document.getElementById('muller-preboot-logo-btn');
            if (btn) {
                btn.addEventListener('click', function () {
                    if (hintTid) { try { clearTimeout(hintTid); } catch (e) {} }
                    dismissPreboot();
                });
                btn.addEventListener('keydown', function (e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        if (hintTid) { try { clearTimeout(hintTid); } catch (e) {} }
                        dismissPreboot();
                    }
                });
            }
            // A los 3 segundos: logo parpadea con destello dorado + aparece "← PULSE AQUÍ"
            hintTid = setTimeout(function () {
                var wrap = document.getElementById('muller-preboot');
                if (!wrap || wrap.classList.contains('is-hidden')) return;
                // Logo parpadea con destello dorado
                if (btn) {
                    btn.classList.add('preboot-logo-blink');
                }
                // Mensaje "← PULSE AQUÍ"
                var h = document.getElementById('muller-preboot-hint');
                if (h) {
                    h.classList.add('muller-preboot-hint--visible');
                    h.setAttribute('aria-hidden', 'false');
                }
            }, 3000);
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupPreboot, { once: true });
        else setupPreboot();
    })();
    </script>

    <!-- App completa (un solo bundle; NO usar app-init.jsx en producción: es solo carcasa modular incompleta) -->
    <script type="text/babel" src="src/app-bundled-from-user-index.jsx"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.getRegistrations()
                    .then(function (regs) {
                        return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
                    })
                    .catch(function () {})
                    .finally(function () {
                        navigator.serviceWorker.register('./sw.js').catch(function () {});
                    });
            });
        }
    </script>
</body>
</html>
