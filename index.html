            /* Invade hacia el centro: menos franja blanca aislada */
            margin-bottom: min(-1.75rem, -2.5vh);
            background: linear-gradient(180deg, #000000 0%, #000000 33.33%, #dd0000 33.33%, #dd0000 66.66%, #ffce00 66.66%, #ffce00 100%);
            box-shadow: 0 4px 24px rgba(0,0,0,0.45);
        }
        .muller-preboot-mid {
            flex: 0 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 100vw;
            position: relative;
            z-index: 1;
            overflow: visible;
            padding: clamp(0.15rem, 0.6vw, 0.4rem) clamp(0.25rem, 1.2vw, 0.5rem);
            background: linear-gradient(180deg, #ffffff 0%, #f1f5f9 100%);
            box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.06);
        }
        .muller-preboot-mid::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 48%;
            pointer-events: none;
            opacity: 0;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.7) 55%, rgba(251, 191, 36, 0.35) 100%);
        }
        .muller-preboot:has(.muller-preboot-logo--blink) .muller-preboot-mid::after,
        .muller-preboot.muller-preboot--blink .muller-preboot-mid::after {
            animation: mullerPrebootBottomFlash 1.1s ease-in-out infinite;
        }
        @keyframes mullerPrebootBottomFlash {
            0%, 100% { opacity: 0; transform: scaleY(0.92); }
            50% { opacity: 0.9; transform: scaleY(1); }
        }
        .muller-preboot-hero-title {
            margin: 0 0 0.1rem;
            font-family: 'Outfit', system-ui, sans-serif;
            font-weight: 800;
            /* Casi todo el ancho, centrado, muy legible */
            font-size: clamp(1.2rem, 6.2vw, 2.1rem);
            letter-spacing: 0.02em;
            line-height: 1.0;
            text-align: center;
            text-transform: uppercase;
            color: #0f172a;
            text-shadow: 0 1px 0 rgba(255,255,255,0.9);
            max-width: 98vw;
            width: 100%;
            box-sizing: border-box;
            padding: 0 0.15rem;
        }
        @media (min-width: 480px) {
            .muller-preboot-hero-title { font-size: clamp(1.35rem, 5.2vw, 2.35rem); }
        }
        @media (min-width: 768px) {
            .muller-preboot-hero-title { font-size: clamp(1.5rem, 3.6vw, 2.8rem); }
        }
        .muller-preboot-hero-title .muller-preboot-uml {
            letter-spacing: 0.04em;
        }
        .muller-preboot-logo-btn {
            -webkit-tap-highlight-color: transparent;
            display: block;
            margin: 0.1rem 0 0;
            padding: 0;
            border: none;
            cursor: pointer;
            background: none !important;
            border-radius: 0;
            box-shadow: none !important;
            line-height: 0;
            transition: transform 180ms ease, opacity 180ms ease;
        }
        .muller-preboot-logo-btn:hover {
            transform: scale(1.02);
        }
        .muller-preboot-logo-btn:focus-visible {
            outline: 2px solid #6366f1;
            outline-offset: 3px;
            border-radius: 0.25rem;
        }
        /* Sólo el PNG, sin caja, sin sombra que parezca marco (si el png trae negro, hay que reexportar) */
        .muller-preboot-logo-btn img {
            display: block;
            width: min(82vw, 18.5rem);
            max-height: min(32vh, 14rem);
            height: auto;
            object-fit: contain;
            object-position: center;
            background: none !important;
            border: 0;
            box-shadow: none;
            filter: none;
        }
        @keyframes mullerPrebootLogoBlink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.86; transform: scale(0.99); }
        }
        .muller-preboot-logo-btn.muller-preboot-logo--blink {
            animation: mullerPrebootLogoBlink 1.1s ease-in-out infinite;
        }
        .muller-preboot-logo-btn.muller-preboot-logo--blink img {
            filter: none;
        }
        /* CTA: texto + flecha hacia el logo (visible a los 3s con el parpadeo) */
        .muller-preboot-cta {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            margin: 0.1rem 0 0.05rem;
            min-height: 0;
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.45s ease, transform 0.45s ease;
            pointer-events: none;
        }
        .muller-preboot-cta--visible {
            opacity: 1;
            transform: translateY(0);
        }
        .muller-preboot-cta-text {
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: clamp(0.75rem, 2.1vw, 0.95rem);
            font-weight: 800;
            color: #b45309;
            letter-spacing: 0.04em;
            text-align: center;
            line-height: 1.2;
        }
        .muller-preboot-cta-arrow {
            display: block;
            font-size: clamp(1.4rem, 4.5vw, 1.85rem);
            line-height: 0.9;
            color: #b45309;
            margin: 0;
            text-shadow: 0 0 1px rgba(0,0,0,0.12);
        }
        .muller-preboot-cta--visible .muller-preboot-cta-arrow {
            animation: mullerPrebootArrowBounce 1.1s ease-in-out infinite;
        }
        @keyframes mullerPrebootArrowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(0.2rem); }
        }
        .muller-preboot-es {
            flex: 0 0 min(28vh, 10rem);
            width: 100%;
            min-height: 4.5rem;
            max-height: 32vh;
            position: relative;
            z-index: 2;
            margin-top: min(-1.75rem, -2.5vh);
            background: linear-gradient(180deg, #aa151b 0%, #aa151b 25%, #f1bf00 25%, #f1bf00 75%, #aa151b 75%, #aa151b 100%);
            box-shadow: 0 -4px 24px rgba(0,0,0,0.45);
        }
    </style>
</head>
<body>
    <div id="muller-preboot" class="muller-preboot" role="dialog" aria-modal="true" aria-labelledby="muller-preboot-hero" aria-describedby="muller-preboot-hint">
        <div class="muller-preboot-de" aria-hidden="true"></div>
        <div class="muller-preboot-mid">
            <h1 id="muller-preboot-hero" class="muller-preboot-hero-title">PROFESOR PLAZA <span class="muller-preboot-uml" lang="de">MÜLLER</span></h1>
            <div id="muller-preboot-hint" class="muller-preboot-cta" role="status" aria-live="polite" aria-hidden="true">
                <span class="muller-preboot-cta-text">Pincha aquí</span>
                <span class="muller-preboot-cta-arrow" aria-hidden="true">↓</span>
            </div>
            <button type="button" id="muller-preboot-logo-btn" class="muller-preboot-logo-btn" title="Pincha en el logo para empezar" aria-label="Pincha en el logo para abrir la aplicación">
                <img src="icons/logo-plaza-sin-fondo.png?v=3" alt="" width="400" height="400" loading="eager" fetchpriority="high" decoding="async" class="muller-preboot-logo-img" />
            </button>
        </div>
        <div class="muller-preboot-es" aria-hidden="true"></div>
    </div>
    <div id="root"></div>

    <script>
    (function () {
        var hintTid;
        function dismissPreboot() {
            if (typeof window.mullerDismissPreboot === 'function') {
                try { window.mullerDismissPreboot(); } catch (e) {}
                return;
            }
            var el = document.getElementById('muller-preboot');
            if (!el) return;
            el.classList.add('is-hidden');
            window.setTimeout(function () {
                try { if (el && el.parentNode) el.parentNode.removeChild(el); } catch (e) {}
            }, 320);
        }
        function setupPreboot() {
            var btn = document.getElementById('muller-preboot-logo-btn');
            if (btn) {
                btn.addEventListener('click', function () {
                    if (hintTid) { try { clearTimeout(hintTid); } catch (e) {} }
                    dismissPreboot();
                });
            }
            hintTid = setTimeout(function () {
                var wrap = document.getElementById('muller-preboot');
                if (!wrap || wrap.classList.contains('is-hidden')) return;
                if (wrap) wrap.classList.add('muller-preboot--blink');
                if (btn) btn.classList.add('muller-preboot-logo--blink');
                var h = document.getElementById('muller-preboot-hint');
                if (h) {
                    h.classList.add('muller-preboot-cta--visible');
                    h.setAttribute('aria-hidden', 'false');
                }
            }, 3000);
        }
        if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', setupPreboot, { once: true });
        else setupPreboot();
    })();
    </script>
    <!-- App completa (un solo bundle; NO usar app-init.jsx en producción: es solo carcasa modular incompleta) -->
    <script type="text/babel" src="src/app-bundled-from-user-index.jsx"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function () {
                navigator.serviceWorker.getRegistrations()
                    .then(function (regs) {
                        return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
                    })
                    .catch(function () {})
                    .finally(function () {
                        navigator.serviceWorker.register('./sw.js').catch(function () {});
                    });
            });
        }
    </script>
</body>
</html>
