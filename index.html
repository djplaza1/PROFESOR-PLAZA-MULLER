    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo } = React;

        // --- COMPONENTE AISLANTE DE ICONOS (Lucide + contenedor “premium” opcional) ---
        const Icon = ({ name, className, nav = false }) => {
            const inner = <span className="lucide-wrapper" dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" class="${className || ''}"></i>` }} />;
            return nav ? <span className="nav-tab-icon">{inner}</span> : inner;
        };

        // --- BASES DE DATOS Y CONFIGURACIÓN INICIAL (sin cambios) ---
        const DEFAULT_GUION = [
            { speaker: 'Lukas', text: 'Hallo Elena! Heute ist ein großer Tag.', translation: '¡Hola Elena! Hoy es un gran día.', vocab: [{ de: 'der Tag', es: 'el día', diff: 0 }] },
            { speaker: 'Lukas', text: 'Ich bin nervös, weil wir Bilder ausstellen.', translation: 'Estoy nervioso porque exponemos cuadros.', vocab: [{ de: 'ausstellen', es: 'exponer', diff: 0 }] },
            { speaker: 'Elena', text: 'Keine Sorge. Du bist ein toller Künstler.', translation: 'No te preocupes. Eres un gran artista.', isRedemittel: true, vocab: [{ de: 'der Künstler', es: 'el artista', diff: 0 }] },
            { speaker: 'Elena', text: 'Du wirst heute viel Anerkennung bekommen.', translation: 'Hoy recibirás mucho reconocimiento.', vocab: [{ de: 'die Anerkennung', es: 'el reconocimiento', diff: 1 }, { de: 'bekommen', es: 'recibir', diff: 0 }] },
            { speaker: 'Lukas', text: 'Schau dir dieses Gemälde hier an.', translation: 'Mira este cuadro de aquí.', vocab: [{ de: 'das Gemälde', es: 'el cuadro', diff: 0 }] },
            { speaker: 'Lukas', text: 'Es ist im Sommer entstanden.', translation: 'Surgió (fue creado) en verano.', vocab: [{ de: 'entstehen', es: 'surgir / crearse', diff: 1 }] },
            { speaker: 'Lukas', text: 'Das ist super! Es gefällt mir sehr.', translation: '¡Eso es genial! Me gusta mucho.', isRedemittel: true, vocab: [{ de: 'super', es: 'genial', diff: 0 }] },
            { speaker: 'Elena', text: 'Man sieht den Einfluss der Natur.', translation: 'Se ve la influencia de la naturaleza.', vocab: [{ de: 'der Einfluss', es: 'la influencia', diff: 1 }] },
            { speaker: 'Herr Weber', text: 'Guten Tag. Wer ist der Maler?', translation: 'Buenas tardes. ¿Quién es el pintor?', vocab: [{ de: 'der Maler', es: 'el pintor', diff: 0 }] },
            { speaker: 'Lukas', text: 'Ich bin es. Ist das eine Skulptur?', translation: 'Soy yo. ¿Es eso una escultura?', vocab: [{ de: 'die Skulptur', es: 'la escultura', diff: 0 }] },
            { speaker: 'Herr Weber', text: 'Das Bild erinnert mich an meine Lebensgeschichte.', translation: 'El cuadro me recuerda a la historia de mi vida.', vocab: [{ de: 'die Lebensgeschichte', es: 'la historia de vida', diff: 0 }] },
            { speaker: 'Herr Weber', text: 'Ich bin 1945 geboren worden.', translation: 'Yo nací en 1945.', vocab: [{ de: 'geboren werden', es: 'nacer', diff: 1 }] },
            { speaker: 'Herr Weber', text: 'Damals gab es viel Zerstörung.', translation: 'En aquel entonces había mucha destrucción.', vocab: [{ de: 'die Zerstörung', es: 'la destrucción', diff: 1 }] },
            { speaker: 'Herr Weber', text: 'Meine Familie musste schnell fliehen.', translation: 'Mi familia tuvo que huir rápido.', vocab: [{ de: 'fliehen', es: 'huir', diff: 1 }] },
            { speaker: 'Elena', text: 'Sie mussten oft gegen Hunger kämpfen.', translation: 'Tuvieron que luchar a menudo contra el hambre.', vocab: [{ de: 'kämpfen gegen', es: 'luchar contra', diff: 1 }] },
            { speaker: 'Herr Weber', text: 'Ja. Ich setze mich für Menschenrechte ein.', translation: 'Sí. Yo me comprometo (intercedo) por los derechos humanos.', vocab: [{ de: 'sich einsetzen für', es: 'interceder por', diff: 1 }, { de: 'das Menschenrecht', es: 'el derecho humano', diff: 0 }] },
            { speaker: 'Herr Weber', text: 'Wir müssen jedes Vorurteil bekämpfen.', translation: 'Tenemos que combatir cada prejuicio.', vocab: [{ de: 'das Vorurteil', es: 'el prejuicio', diff: 1 }] },
            { speaker: 'Lukas', text: 'Da hast du völlig recht!', translation: '¡Ahí tienes toda la razón!', isRedemittel: true, vocab: [{ de: 'recht haben', es: 'tener razón', diff: 1 }] },
            { speaker: 'Lukas', text: 'Es gibt ein Gewitter. Da war ein Blitz!', translation: 'Hay una tormenta. ¡Allí hubo un rayo!', vocab: [{ de: 'das Gewitter', es: 'la tormenta eléctrica', diff: 0 }, { de: 'der Blitz', es: 'el rayo', diff: 1 }] },
            { speaker: 'Lukas', text: 'Elena! Es gab einen Diebstahl in der Galerie!', translation: '¡Elena! ¡Hubo un robo en la galería!', vocab: [{ de: 'der Diebstahl', es: 'el robo', diff: 1 }] },
            { speaker: 'Lukas', text: 'Die Polizei muss den Dieb verhaften.', translation: 'La policía debe detener al ladrón.', vocab: [{ de: 'verhaften', es: 'detener', diff: 1 }] }
        ];
        window.__DEFAULT_GUION__ = DEFAULT_GUION;

        const TEMPUS_DICT = {
            "ausstellen": "Prät: stellte aus | Perf: hat ausgestellt",
            "bekommen": "Prät: bekam | Perf: hat bekommen",
            "entstehen": "Prät: entstand | Perf: ist entstanden",
            "entstanden": "Prät: entstand | Perf: ist entstanden",
            "sehen": "Prät: sah | Perf: hat gesehen",
            "sieht": "Prät: sah | Perf: hat gesehen",
            "geboren": "Prät: wurde geboren | Perf: ist geboren worden",
            "fliehen": "Prät: floh | Perf: ist geflohen",
            "kämpfen": "Prät: kämpfte | Perf: hat gekämpft",
            "anerkennen": "Prät: erkannte an | Perf: hat anerkannt",
            "stehlen": "Prät: stahl | Perf: hat gestohlen",
            "gestohlen": "Prät: stahl | Perf: hat gestohlen",
            "verhaften": "Prät: verhaftete | Perf: hat verhaftet",
            "sterben": "Prät: starb | Perf: ist gestorben",
            "gestorben": "Prät: starb | Perf: ist gestorben",
            "einsetzen": "Prät: setzte ein | Perf: hat eingesetzt",
            "essen": "Prät: aß | Perf: hat gegessen",
            "trinken": "Prät: trank | Perf: hat getrunken",
            "fahren": "Prät: fuhr | Perf: ist gefahren",
            "gehen": "Prät: ging | Perf: ist gegangen",
            "kommen": "Prät: kam | Perf: ist gekommen",
            "sprechen": "Prät: sprach | Perf: hat gesprochen",
            "nehmen": "Prät: nahm | Perf: hat genommen",
            "geben": "Prät: gab | Perf: hat gegeben",
            "helfen": "Prät: half | Perf: hat geholfen",
            "laufen": "Prät: lief | Perf: ist gelaufen",
            "schlafen": "Prät: schlief | Perf: hat geschlafen",
            "treffen": "Prät: traf | Perf: hat getroffen",
            "finden": "Prät: fand | Perf: hat gefunden",
            "bleiben": "Prät: blieb | Perf: ist geblieben",
            "tragen": "Prät: trug | Perf: hat getragen",
            "waschen": "Prät: wusch | Perf: hat gewaschen",
            "verlieren": "Prät: verlor | Perf: hat verloren",
            "schreiben": "Prät: schrieb | Perf: hat geschrieben",
            "lesen": "Prät: las | Perf: hat gelesen",
            "wissen": "Prät: wusste | Perf: hat gewusst",
            "denken": "Prät: dachte | Perf: hat gedacht",
            "bringen": "Prät: brachte | Perf: hat gebracht",
            "kennen": "Prät: kannte | Perf: hat gekannt",
            "nennen": "Prät: nannte | Perf: hat genannt"
        };

                const BX_DB_EMPTY = { vocabulario: [], verbos: [], preposiciones: [], conectores: [], redemittel: [] };
        function normalizeBxPayload(data) {
            if (!data || typeof data !== 'object') return { b1: { ...BX_DB_EMPTY }, b2: { ...BX_DB_EMPTY } };
            const b1 = data.b1 || data.B1;
            const b2 = data.b2 || data.B2;
            return {
                b1: b1 ? { ...BX_DB_EMPTY, ...b1 } : { ...BX_DB_EMPTY },
                b2: b2 ? { ...BX_DB_EMPTY, ...b2 } : { ...BX_DB_EMPTY }
            };
        }
        const BX_DB_FALLBACK = normalizeBxPayload({
            b1: {
                vocabulario: [{ b1: "Daten werden geladen …", b2: "b1-b2-database.json fehlt oder Netzwerkfehler.", es: "", trick: "Coloca b1-b2-database.json junto a index.html en el servidor." }]
            },
            b2: {
                vocabulario: [{ b1: "Daten werden geladen …", b2: "Mismo JSON: claves b1 y b2.", es: "", trick: "Amplía arrays en el JSON sin tocar index.html." }]
            }
        });

        function tryBxSession() {
            try {
                const raw = sessionStorage.getItem('muller_b1b2_json_v1');
                if (!raw) return null;
                return normalizeBxPayload(JSON.parse(raw));
            } catch (e) {
                return null;
            }
        }

        const GRAMMAR_PATTERNS = [
            { regex: /(interessier[en|t|e]+\s+(?:(?:mich|dich|sich|uns|euch|sehr|wirklich)\s+)*für)/gi, tooltip: "sich interessieren für + Akk", base: "sich interessieren für" },
            { regex: /(gegen\s+(?:.*?\s+)?kämpfen|kämpfen\s+(?:.*?\s+)?gegen)/gi, tooltip: "kämpfen gegen + Akk", base: "kämpfen gegen" },
            { regex: /(setz[en|t|e]+\s+(?:(?:mich|dich|sich|uns|euch|heute|jetzt)\s+)*(?:.*?\s+)?für(?:.*?\s+)?ein)/gi, tooltip: "sich einsetzen für + Akk", base: "sich einsetzen für" },
            { regex: /(erinner[en|t|e]+\s+(?:(?:mich|dich|sich|uns|euch|noch|sehr)\s+)*an)/gi, tooltip: "sich erinnern an + Akk", base: "sich erinnern an" },
            { regex: /(wart[en|e|et]+\s+(?:.*?\s+)?auf)/gi, tooltip: "warten auf + Akk", base: "warten auf" }
        ];

        const CONN_LIST = ["weil", "dass", "obwohl", "wenn", "als", "damit", "ob", "bevor", "nachdem", "deshalb", "deswegen", "darum", "trotzdem", "dann", "danach", "außerdem", "und", "aber", "oder", "denn", "sondern"];
        const PREP_DAT = ["aus", "bei", "mit", "nach", "seit", "von", "zu", "ab"];
        const PREP_AKK = ["durch", "für", "gegen", "ohne", "um"];
        const PREP_WECHSEL = ["in", "an", "auf", "neben", "hinter", "über", "unter", "vor", "zwischen"];

        const MULLER_BX_USER_OVERLAY_KEY = 'muller_bx_user_overlay_v1';

        function tryBxUserOverlay() {
            try {
                const raw = localStorage.getItem(MULLER_BX_USER_OVERLAY_KEY);
                if (!raw) return normalizeBxPayload({});
                return normalizeBxPayload(JSON.parse(raw));
            } catch (e) {
                return normalizeBxPayload({});
            }
        }

        function mergeBxLevel(base, extra) {
            const out = {};
            Object.keys(BX_DB_EMPTY).forEach((k) => {
                out[k] = [...(base[k] || []), ...(extra[k] || [])];
            });
            return out;
        }

        function mergeBxDatabases(remoteNorm, overlayNorm) {
            const r = normalizeBxPayload(remoteNorm || {});
            const o = normalizeBxPayload(overlayNorm || {});
            return {
                b1: mergeBxLevel(r.b1, o.b1),
                b2: mergeBxLevel(r.b2, o.b2)
            };
        }

        function mullerFindUserBxCategory(overlayNorm, level, uid) {
            if (!uid || !overlayNorm || !overlayNorm[level]) return null;
            const lv = overlayNorm[level];
            for (const cat of Object.keys(BX_DB_EMPTY)) {
                const arr = lv[cat];
                if (!Array.isArray(arr)) continue;
                if (arr.some((x) => x && x._mullerUid === uid)) return cat;
            }
            return null;
        }

        function mullerBxItemKey(item) {
            return (item.b1 || '') + '\u0000' + (item.b2 || '') + '\u0000' + (item.es || '');
        }

        /** Conectores típicos al inicio de frase (no incluimos und/oder/aber para reducir falsos positivos). */
        const MULLER_BX_CONN_START = ['weil', 'dass', 'obwohl', 'wenn', 'als', 'damit', 'ob', 'bevor', 'nachdem', 'deshalb', 'deswegen', 'darum', 'trotzdem', 'dann', 'danach', 'außerdem', 'denn', 'sondern', 'falls', 'sobald', 'solange', 'während', 'zuerst', 'anschließend', 'schließlich', 'zunächst', 'inzwischen', 'allerdings', 'jedoch', 'hingegen', 'folglich', 'trotz', 'außer', 'indem'];

        function mullerClassifyBibliotecaLine(german, meta) {
            if (!german || typeof german !== 'string') return 'vocabulario';
            const g = german.replace(/\s+/g, ' ').trim();
            const lower = g.toLowerCase();
            if (meta && meta.isRedemittel) return 'redemittel';

            const firstTok = lower.split(/[\s,.;:]+/).filter(Boolean)[0] || '';
            if (MULLER_BX_CONN_START.includes(firstTok)) return 'conectores';

            const connMulti = ['zuerst', 'danach', 'später', 'schließlich', 'zunächst', 'anschließend', 'inzwischen', 'deswegen', 'trotzdem', 'allerdings', 'hingegen', 'folglich', 'außerdem', 'jedoch', 'dafür', 'dagegen', 'dabei', 'sonst'];
            if (connMulti.some((c) => lower.startsWith(c + ' '))) return 'conectores';

            if (/^(können|könnte|könnten|dürfte|dürfen|entschuldigung|vielen dank|danke|herzlichen|guten tag|guten morgen|guten abend|bis bald|auf wiedersehen|wie bitte|kein problem|ich möchte|ich hätte gerne|ich würde gerne|lass uns|wir könnten|ich bin der meinung)/i.test(lower) && g.length < 140) return 'redemittel';

            if (/^(sich\s+[a-zäöüß]+\s+(an|auf|für|von|über|mit|zu)\b)/i.test(g)) return 'verbos';
            if (/\b(freuen|erinnern|halten|denken|sorgen|interessieren|vorbereiten|kümmern|verlassen|verzichten|bewerben|verabreden|entscheiden|einigen|bemühen|verstehen|bedanken)\s+(mich|dich|sich|uns|euch)?\s*(an|auf|für|von|über|mit|zu|in)\b/i.test(lower)) return 'verbos';

            const words = g.split(/\s+/).filter(Boolean);
            if (meta && meta.isPair && words.length <= 5) return 'vocabulario';

            if (words.length <= 3 && /^[a-zäöüß]+(en|eln|ern)$/i.test(words[0])) return 'verbos';

            if (/^(an|auf|in|mit|für|zu|von|über|unter|vor|nach|aus|bei|gegen|ohne|um|anstatt|trotz|während)\s+(dem|der|den|das|die|ein|eine|mich|dir|mir|sich|ihm|ihr|uns|euch)/i.test(g)) return 'preposiciones';

            if (/\b(an|auf|in|mit|für|zu|von|über|nach|vor|aus|bei)\s+(dem|der|den|das|die|ein|eine|mich|dich|sich)\b/i.test(lower)) {
                if (/^(ich|du|er|sie|es|wir|ihr|man|sie)\s+/i.test(g)) return 'preposiciones';

        function mullerExtractBibliotecaSegments(raw) {
            const out = [];
            if (!raw || typeof raw !== 'string') return out;
            const lines = raw.split(/\n/);
            for (let line of lines) {
                line = line.trim();
                if (!line || line.startsWith('#')) continue;

                const speakerMatch = line.match(/^([^:]+):\s*(.+)$/);
                if (speakerMatch) {
                    let content = speakerMatch[2];
                    const isRedemittel = /\[R\]|\bNützlich\b/i.test(content);
                    content = content.replace(/\[R\]/g, '').replace(/\bNützlich\.?\s*/gi, '').trim();

                    let vocabInner = null;
                    const vocabMatch = content.match(/\[(.*?)\]/);
                    if (vocabMatch) {
                        vocabInner = vocabMatch[1];
                        content = content.replace(vocabMatch[0], '').trim();
                    }

                    let translation = '';
                    const transMatch = content.match(/\(([^)]+)\)/);
                    if (transMatch) {
                        translation = transMatch[1].trim();
                        content = content.replace(transMatch[0], '').trim();
                    }

                    const germanText = content.replace(/[🔴🔵🟢•]/g, '').replace(/\s+/g, ' ').trim();
                    if (germanText) out.push({ german: germanText, es: translation, isRedemittel });

                    if (vocabInner) {
                        vocabInner.split(',').forEach((piece) => {
                            const parts = piece.split('-');
                            if (parts.length >= 2) {
                                const de = parts[0].trim().replace(/[🔴🔵🟢•]/g, '');
                                const es = parts.slice(1).join('-').trim();
                                if (de) out.push({ german: de, es: es, isRedemittel: false, isPair: true });
                            }
                        });
                    }
                    continue;
                }

                const pairMatch = line.match(/^(.+?)\s*[-–—]\s*(.+)$/);
                if (pairMatch && !line.includes(':')) {
                    const de = pairMatch[1].replace(/^[•\-\d.)\]]+\s*/, '').trim();
                    const es = pairMatch[2].trim();
                    const looksDe = /[äöüßÄÖÜ]/.test(de) || /^(der|die|das|ein|eine|ich|du|sich|und|nicht)\b/i.test(de);
                    if (de && es && looksDe) {
                        out.push({ german: de, es: es, isRedemittel: false, isPair: true });
                        continue;
                    }
                }

                const plain = line.replace(/^[•\-\d.)\]]+\s*/, '').trim();
                if (plain.length >= 2) out.push({ german: plain, es: '', isRedemittel: false });
            }
            return out;
        }

            for (const seg of segs) {

                    es: es,
                    trick: 'Biblioteca · ' + cat + ' · heurística local (sin IA)'

                const k = mullerBxItemKey(item) + '|' + cat;
                if (seen.has(k)) continue;

            return {

            };
        }

        const levenshteinDistance = (a, b) => {
            if (a.length === 0) return b.length;
            if (b.length === 0) return a.length;
            const matrix = [];
            for (let i = 0; i <= b.length; i++) { matrix[i] = [i]; }
            for (let j = 0; j <= a.length; j++) { matrix[0][j] = j; }
            for (let i = 1; i <= b.length; i++) {
                for (let j = 1; j <= a.length; j++) {
                    if (b.charAt(i - 1) === a.charAt(j - 1)) {
                        matrix[i][j] = matrix[i - 1][j - 1];
                    } else {
                        matrix[i][j] = Math.min(matrix[i - 1][j - 1] + 1, Math.min(matrix[i][j - 1] + 1, matrix[i - 1][j] + 1));
                    }
                }
            }
            return matrix[b.length][a.length];
        };

        /** Normaliza texto alemán para comparar lo que dicta el STT con el guion (umlauts, ß, puntuación). */
        const normalizeGermanSpeechText = (s) => {
            if (!s || typeof s !== 'string') return '';
            let t = s.toLowerCase().trim();
            t = t.replace(/\u00df/g, 'ss').replace(/ß/g, 'ss');
            t = t.replace(/ä/g, 'ae').replace(/ö/g, 'oe').replace(/ü/g, 'ue');
            t = t.replace(/[’'`´]/g, "'");
            t = t.replace(/[^a-z0-9\s']/g, ' ');
            t = t.replace(/\s+/g, ' ').trim();
            return t;
        };

        const germanWordDistanceOk = (a, b) => {
            if (a === b) return true;
            const d = levenshteinDistance(a, b);
            const L = Math.max(a.length, b.length, 1);
            if (L <= 2) return d <= 0;
            if (L <= 5) return d <= 1;
            if (L <= 10) return d <= 2;
            return d <= Math.min(3, Math.floor(L * 0.25));
        };

        const matchGermanWordsSequential = (origWords, spokenWords) => {
            const feedback = [];
            let si = 0;
            for (const ow of origWords) {
                if (!ow) continue;
                let found = false;
                for (let j = si; j < spokenWords.length; j++) {
                    if (germanWordDistanceOk(ow, spokenWords[j])) {
                        found = true;
                        si = j + 1;
                        break;
                    }
                }
                feedback.push({ word: ow, correct: found });
            }
            return feedback;
        };

        function mullerApplyVocabSrsRating(map, word, level) {
            const key = mullerVocabSrsKey(word);
            const todayStr = new Date().toISOString().slice(0, 10);
            const prev = map[key] || null;
            const q = level === 'hard' ? 2 : level === 'normal' ? 3 : 4;
            let interval = prev && typeof prev.interval === 'number' ? prev.interval : 0;
            let repetitions = prev && typeof prev.repetitions === 'number' ? prev.repetitions : 0;
            let easeFactor = prev && typeof prev.easeFactor === 'number' ? prev.easeFactor : 2.5;
            if (q < 3) {
                repetitions = 0;
                interval = 1;
                easeFactor = Math.max(1.3, easeFactor - 0.2);
            } else {
                if (repetitions === 0) interval = 1;
                else if (repetitions === 1) interval = 6;

                repetitions += 1;
                easeFactor = easeFactor + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02));

            words.forEach((w) => {
                const rec = map[mullerVocabSrsKey(w)];
                if (!rec || !rec.due) { n++; return; }
                if (rec.due <= todayStr) n++;
            });
            return n;
        }

              const words = text.split(/\s+/);

              words.forEach(word => {

                      if (!processed.has(cleanWord)) { foundVerbs.push({ infinitive: cleanWord, forms: TEMPUS_DICT[cleanWord] }); processed.add(cleanWord); }

                      if (!processed.has(infinitive)) {

                  noiseContextRef.current = ctx;
                  const bufferSize = 4096;
                  const noiseNode = ctx.createScriptProcessor(bufferSize, 1, 1);
                  noiseNode.onaudioprocess = (e) => {
                      const output = e.outputBuffer.getChannelData(0);
                      for (let i = 0; i < bufferSize; i++) {
                          output[i] = (Math.random() * 2 - 1) * 0.15; // Ruido blanco a bajo volumen
                      }
                  };
                  const gainNode = ctx.createGain();
                  gainNode.gain.value = 0.08; // Volumen muy bajo
                  noiseGainRef.current = gainNode;
                  noiseNode.connect(gainNode);
                  gainNode.connect(ctx.destination);
                  noiseSourceRef.current = noiseNode;
              } catch(e) { console.warn("No se pudo iniciar ruido de fondo:", e); }
          };

          const handleSaveCustomVocab = () => {
              if (!vocabTitleInput.trim()) { alert("Por favor, dale un título a la lección."); return; }
              if (!vocabTextInput.trim()) { alert("Por favor, pega el vocabulario."); return; }
              const lines = vocabTextInput.split(/\r?\n/);
              let parsedWords = [];
              const cleanStr = (str) => {
                  let s = str.replace(/[\x00-\x1F\x7F-\x9F\u200B-\u200D\uFEFF]/g, ''); 
                  s = s.replace(/[\u{1F000}-\u{1F9FF}]|[\u{2600}-\u{26FF}]|[\u{2700}-\u{27BF}]|[\u{2B50}]|\u{FE0F}/gu, ''); 
                  return s.trim();
              };
              lines.forEach(line => {
                  let text = line.trim().replace(/–/g, '-').replace(/—/g, '-');
                  if (!text) return;
                  let isDiff = false;
                  if (text.startsWith('1')) { isDiff = true; text = text.replace(/^1[.\-):\]]*\s*/, '').trim(); }
                  text = text.replace(/^[-*•+>]\s*/, '').trim();
                  text = text.replace(/^\d+[.\-):\]]+\s*/, '').trim();
                  let de = ""; let es = "";
                  const match = text.match(/(\s+-\s+|\s+=\s+|\t|\s{2,}|={1,})/);
                  if (match) {
                      const sepIndex = text.indexOf(match[0]);
                      de = cleanStr(text.substring(0, sepIndex));
                      es = cleanStr(text.substring(sepIndex + match[0].length));
                  } else {
                      const hyphenMatch = text.match(/(^|\s)-(?!\w)|(?<!\w)-(\s|$)/);
                      if (hyphenMatch) {
                          const sepIndex = text.indexOf(hyphenMatch[0]);
                          de = cleanStr(text.substring(0, sepIndex));
                          es = cleanStr(text.substring(sepIndex + hyphenMatch[0].length));
                      } else {
                          let words = text.split(' ');
                          let splitPoint = 1;
                          if (words.length > 2 && /^(sich|der|die|das|ein|eine)$/i.test(words[0])) splitPoint = 2;
                          if (words.length > splitPoint && words[splitPoint].startsWith('(')) splitPoint++;
                          de = cleanStr(words.slice(0, splitPoint).join(' '));
                          es = cleanStr(words.slice(splitPoint).join(' '));
                          if (!es) es = "???";
                      }
                  }
                  de = de.replace(/^1[.\-):\]]*\s*/, '').trim();
                  es = es.replace(/^1[.\-):\]]*\s*/, '').trim();
                  if (de) parsedWords.push({ de, es, diff: isDiff ? 1 : 0 });
              });
              if (parsedWords.length > 0) {
                  const newLesson = { id: Date.now().toString() + Math.random().toString(36).substring(7), title: vocabTitleInput, words: parsedWords };
                  const updatedLessons = [...customVocabLessons, newLesson];
                  setCustomVocabLessons(updatedLessons);
                  localStorage.setItem('mullerCustomVocab', JSON.stringify(updatedLessons));
                  setVocabTitleInput(""); setVocabTextInput("");
                  alert(`¡Genial! Se ha guardado la lección "${vocabTitleInput}" con ${parsedWords.length} palabras.`);
              } else { alert("No pude detectar vocabulario válido. Pega texto para guardar."); }
          };

  const handleSaveScript = () => {
    if (!newScriptTitle.trim()) { alert("Dale un título al guion primero."); return; }
    try {
        const lines = scriptInput.split('\n');
        const newGuion = [];
        lines.forEach(line => {
            let cleanLine = line.trim();
            if (!cleanLine) return;

            // 1. Extraer Hablante (Nombre:)
            const speakerMatch = cleanLine.match(/^([^:]+):/);
            if (!speakerMatch) return;
            const speaker = speakerMatch[1].trim();
            let content = cleanLine.substring(speakerMatch[0].length).trim();

            // 2. Extraer Redemittel [R]
            let isRedemittel = false;
            if (content.includes('[R]')) {
                isRedemittel = true;
                content = content.replace('[R]', '').trim();
            }

            // 3. Extraer Vocabulario [...]
            let vocab = [];
            const vocabMatch = content.match(/\[(.*?)\]/);
            if (vocabMatch) {
                const vocabPairs = vocabMatch[1].split(',');
                vocabPairs.forEach(pair => {
                    const parts = pair.split('-');
                    if (parts.length >= 2) {
                        const cleanDe = parts[0].trim().replace(/[🔴🔵🟢•]/g, '');
                        vocab.push({ de: cleanDe, es: parts[1].trim(), diff: 1 });
                    }
                });
                content = content.replace(vocabMatch[0], '').trim();
            }

            // 4. Extraer Traducción (...)
            let translation = "Traducción no proporcionada";
            const transMatch = content.match(/\(([^)]+)\)/);
            if (transMatch) {
                translation = transMatch[1].trim();
                content = content.replace(transMatch[0], '').trim();
            }

            // 5. Alemán (limpio de círculos para el audio)
            const germanText = content.replace(/[🔴🔵🟢]/g, '').trim();

            if (germanText) {
                newGuion.push({ speaker, text: germanText, translation, isRedemittel, vocab });
            }
        });

        if (newGuion.length === 0) throw new Error("Formato no reconocido");

        const scriptObj = { id: Date.now().toString(), title: newScriptTitle, data: JSON.stringify(newGuion), timestamp: Date.now() };
        const newSaved = [...savedScripts, scriptObj].sort((a,b)=>a.title.localeCompare(b.title));
        setSavedScripts(newSaved);
        localStorage.setItem('mullerScripts', JSON.stringify(newSaved));
        try {
            if (typeof caches !== 'undefined') {
                const meta = { lastScriptTitle: newScriptTitle, lastSceneCount: newGuion.length, savedAt: new Date().toISOString() };
                caches.open('muller-offline-user-v1').then((cache) => cache.put(
                    new Request(new URL('./.muller-offline-meta.json', window.location.href).toString()),
                    new Response(JSON.stringify(meta), { headers: { 'Content-Type': 'application/json' } })
                )).catch(function () {});
            }
        } catch (e) {}
        setGuionData(newGuion); setActiveScriptTitle(newScriptTitle); setIsDefaultScript(false); 
        setSceneIndex(0); setMode('dialogue'); stopAudio(); resetModes(); setIsReviewing(false);
        setNewScriptTitle(""); setActiveTab('historia');
    } catch (e) { 
        alert("Error al procesar. Asegúrate de usar el formato: Nombre: Texto Alemán. (Traducción) [vocab-trad]"); 
    }

                <div><h2>🔵 Vocabulario Normal</h2>${userStats.normalVocab?.length ? `<table><tr><th>Alemán</th><th>Español</th></tr>${userStats.normalVocab.map(v => `<tr><td class="norm">${v.de}</td><td>${v.es}</td></tr>`).join('')}</table>` : '<p>Vacío.</p>'}</div>
                <div><h2>🧠 Reglas Gramaticales</h2>${userStats.difficultGrammar?.length ? `<table><tr><th>Regla</th><th>Ejemplo</th><th>Traducción</th></tr>${userStats.difficultGrammar.map(g => `<tr><td class="grammar-base">${g.base}</td><td><i>"${g.exampleDe}"</i></td><td>${g.exampleEs}</td></tr>`).join('')}</table>` : '<p>Vacío.</p>'}</div>
                <script>window.onload = function() { window.print(); }<\/script></body></html>
            `;
            printWindow.document.write(htmlContent);
            printWindow.document.close();
          };

          // COLORES DE FONDO SUAVIZADOS (Corrección) + temas UI
          const getBgColor = () => {
              if (uiTheme === 'light') {
                  if (activeTab === 'inicio') return 'bg-slate-100';
                  if (activeTab === 'progreso') return 'bg-indigo-100';
                  if (activeTab === 'guiones') return 'bg-slate-100';
                  if (activeTab === 'vocabulario') return 'bg-amber-50';
                  if (activeTab === 'b1meister' || activeTab === 'b2ausblick') return 'bg-slate-100';
                  if (activeTab === 'storybuilder') return 'bg-indigo-100';
                  if (activeTab === 'shadowing') return 'bg-teal-50';
                  if (activeTab === 'escritura') return 'bg-stone-100';
                  if (activeTab === 'telc') return 'bg-slate-100';
                  return 'bg-slate-50';
              }
              if (uiTheme === 'hc') return 'bg-black';
              if (activeTab === 'telc') return 'bg-slate-950';
              if (activeTab === 'inicio') return 'bg-slate-950';
              if (activeTab === 'progreso') return 'bg-indigo-950';
              if (activeTab === 'guiones') return 'bg-slate-900';
              if (activeTab === 'vocabulario') return 'bg-amber-950/70'; // Suavizado
              if (activeTab === 'b1meister' || activeTab === 'b2ausblick') return 'bg-slate-900'; // Suavizado
              if (activeTab === 'storybuilder') return 'bg-indigo-950'; // Suavizado
              if (activeTab === 'shadowing') return 'bg-teal-950/90';
              if (activeTab === 'escritura') return 'bg-stone-950';
              if (fluesternMode) return 'bg-zinc-900 filter contrast-125 sepia-50'; 
              if (isReviewing || practiceActive) return 'bg-gray-900'; // Suavizado
              const speaker = guionData[getActualSceneIndex()]?.speaker;
              if (speaker === 'Lukas') return 'bg-slate-900';
              if (speaker === 'Elena' || speaker === 'Anna') return 'bg-slate-800'; // Suavizado
              if (speaker?.includes('Weber') || speaker === 'Professor') return 'bg-emerald-950';
              return 'bg-gray-900'; 
          };
          const themeShellClass = uiTheme === 'light' ? 'muller-theme-light' : uiTheme === 'hc' ? 'muller-theme-hc' : '';

          const currentPracticeList = practiceActive === 'diff' ? userStats.difficultVocab : (practiceActive === 'norm' ? userStats.normalVocab : userStats.difficultGrammar);
          const currentPracticeItem = currentPracticeList ? currentPracticeList[practiceIndex] : null;

          /** Lienzo para lápiz óptico / dedo: pointer capture, sin scroll al trazar. */
          const TabletWritingCanvas = ({ padKey, grid, strokeW, compareTarget, onOcrCompared }) => {
              const wrapRef = useRef(null);
              const canvasRef = useRef(null);
              const ctxRef = useRef(null);
              const drawingRef = useRef(false);
              const sizeRef = useRef({ w: 400, h: 400 });
              const [ocrLoading, setOcrLoading] = useState(false);
              const [ocrText, setOcrText] = useState('');
              const [ocrHint, setOcrHint] = useState('');
              const [ocrErr, setOcrErr] = useState('');
              const [ocrComparePct, setOcrComparePct] = useState(null);

              const layoutCanvas = useCallback(() => {
                  const canvas = canvasRef.current;
                  const wrap = wrapRef.current;
                  if (!canvas || !wrap) return;
                  const w = wrap.clientWidth;
                  const h = Math.max(280, Math.min(560, Math.floor((typeof window !== 'undefined' ? window.innerHeight : 600) * 0.42)));
                  const dpr = window.devicePixelRatio || 1;
                  sizeRef.current = { w, h };
                  canvas.width = w * dpr;
                  canvas.height = h * dpr;
                  canvas.style.width = `${w}px`;
                  canvas.style.height = `${h}px`;
                  const ctx = canvas.getContext('2d');
                  ctx.setTransform(1, 0, 0, 1, 0, 0);
                  ctx.scale(dpr, dpr);
                  ctx.lineCap = 'round';
                  ctx.lineJoin = 'round';
                  ctx.strokeStyle = '#f1f5f9';
                  ctx.lineWidth = strokeW;
                  ctxRef.current = ctx;
              }, [strokeW, padKey]);

              useEffect(() => { layoutCanvas(); }, [layoutCanvas]);

              const getPos = (e) => {
                  const canvas = canvasRef.current;
                  if (!canvas) return { x: 0, y: 0 };
                  const rect = canvas.getBoundingClientRect();
                  let cx = e.clientX;
                  let cy = e.clientY;
                  if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
                  else if (e.changedTouches && e.changedTouches[0]) { cx = e.changedTouches[0].clientX; cy = e.changedTouches[0].clientY; }
                  return { x: cx - rect.left, y: cy - rect.top };
              };

              const startDraw = (e) => {
                  e.preventDefault();
                  const ctx = ctxRef.current;
                  if (!ctx) return;
                  try { if (e.pointerId != null) canvasRef.current.setPointerCapture(e.pointerId); } catch (err) {}
                  drawingRef.current = true;
                  const p = getPos(e);
                  ctx.beginPath();
                  ctx.moveTo(p.x, p.y);
              };
              const moveDraw = (e) => {
                  e.preventDefault();
                  if (!drawingRef.current || !ctxRef.current) return;
                  const p = getPos(e);
                  ctxRef.current.lineTo(p.x, p.y);
                  ctxRef.current.stroke();
              };
              const endDraw = (e) => {
                  e.preventDefault();
                  drawingRef.current = false;
                  try { if (e.pointerId != null) canvasRef.current.releasePointerCapture(e.pointerId); } catch (err) {}
              };

              const clearPad = () => {
                  const ctx = ctxRef.current;
                  const { w, h } = sizeRef.current;
                  if (!ctx) return;
                  ctx.clearRect(0, 0, w, h);
              };
              const savePng = () => {
                  const canvas = canvasRef.current;
                  if (!canvas) return;
                  const link = document.createElement('a');
                  link.download = `muller_escritura_${Date.now()}.png`;
                  link.href = canvas.toDataURL('image/png');
                  link.click();
              };

              const canvasToBlackOnWhite = (source) => {
                  const w = source.width;
                  const h = source.height;
                  const tmp = document.createElement('canvas');
                  tmp.width = w;
                  tmp.height = h;
                  const sctx = source.getContext('2d');
                  const tctx = tmp.getContext('2d');
                  const img = sctx.getImageData(0, 0, w, h);
                  const d = img.data;
                  const out = tctx.createImageData(w, h);
                  const o = out.data;
                  for (let i = 0; i < d.length; i += 4) {
                      const a = d[i + 3];
                      const v = a > 40 ? 0 : 255;
                      o[i] = v;
                      o[i + 1] = v;
                      o[i + 2] = v;
                      o[i + 3] = 255;
                  }
                  tctx.putImageData(out, 0, 0);
                  return tmp;
              };

              const runHandwritingOcr = async () => {
                  if (typeof Tesseract === 'undefined') {
                      setOcrErr('No se pudo cargar Tesseract.js. Comprueba la conexión y recarga.');
                      return;
                  }
                  const source = canvasRef.current;
                  if (!source || source.width < 8) return;
                  setOcrErr('');
                  setOcrText('');
                  setOcrComparePct(null);
                  setOcrLoading(true);
                  setOcrHint('Preparando imagen…');
                  let worker;
                  try {
                      const bw = canvasToBlackOnWhite(source);
                      worker = await Tesseract.createWorker('deu', 1, {
                          logger: (m) => {
                              if (m.status === 'recognizing text' && m.progress != null) setOcrHint(`Leyendo… ${Math.round(100 * m.progress)}%`);
                              else if (m.status && String(m.status).includes('loading')) setOcrHint('Descargando modelo alemán (solo la 1ª vez, ~2–5 MB)…');
                              else if (m.status) setOcrHint(String(m.status));
                          },
                      });
                      const { data: { text } } = await worker.recognize(bw);
                      await worker.terminate();
                      worker = null;
                      const t = (text || '').replace(/\s+\n/g, '\n').trim();
                      setOcrText(t);
                      let computedPct = null;
                      if (compareTarget && t) {
                          const a = normalizeGermanSpeechText(compareTarget);
                          const b = normalizeGermanSpeechText(t);
                          if (a.length && b.length) {
                              const dist = levenshteinDistance(a, b);
                              const maxL = Math.max(a.length, b.length, 1);
                              computedPct = Math.min(100, Math.max(0, Math.round((100 * (maxL - dist)) / maxL)));
                              setOcrComparePct(computedPct);
                          } else setOcrComparePct(null);
                      } else setOcrComparePct(null);
                      if (!t) setOcrHint('No se detectó texto. Escribe más grande o con más contraste.');
                      else setOcrHint('');
                      if (typeof onOcrCompared === 'function' && (computedPct != null || t)) {
                          onOcrCompared({
                              pct: computedPct,
                              textSnippet: (t || '').slice(0, 120),
                              targetSnippet: typeof compareTarget === 'string' ? compareTarget.slice(0, 120) : ''
                          });
                      }
                  } catch (err) {
                      if (worker) try { await worker.terminate(); } catch (e) {}
                      setOcrErr(err?.message || 'Error en OCR');
                      setOcrHint('');
                  } finally {
                      setOcrLoading(false);
                  }
              };

              return (
                  <div className="space-y-3">
                      <div ref={wrapRef} className={grid ? 'writing-pad-wrap' : 'rounded-xl border-2 border-slate-600 bg-[#0c1222] overflow-hidden'}>
                          <canvas
                              ref={canvasRef}
                              className="writing-lab-canvas"
                              onPointerDown={startDraw}
                              onPointerMove={moveDraw}
                              onPointerUp={endDraw}
                              onPointerLeave={endDraw}
                              onPointerCancel={endDraw}
                              onMouseDown={startDraw}
                              onMouseMove={moveDraw}
                              onMouseUp={endDraw}
                              onTouchStart={(e) => { e.preventDefault(); startDraw(e); }}
                              onTouchMove={(e) => { e.preventDefault(); moveDraw(e); }}
                              onTouchEnd={(e) => { e.preventDefault(); endDraw(e); }}
                          />
                      </div>
                      <div className="flex flex-wrap gap-2 justify-center items-center">
                          <button type="button" onClick={clearPad} className="px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 text-sm font-bold">Borrar lienzo</button>
                          <button type="button" onClick={savePng} className="px-4 py-2 rounded-lg bg-emerald-700 hover:bg-emerald-600 text-sm font-bold">Guardar PNG</button>
                          <button
                              type="button"
                              disabled={ocrLoading}
                              onClick={runHandwritingOcr}
                              className="px-4 py-2 rounded-lg bg-indigo-700 hover:bg-indigo-600 disabled:opacity-50 text-sm font-bold flex items-center gap-2"
                              title="OCR gratuito en tu dispositivo (Tesseract). La primera vez descarga el idioma alemán."
                          >
                              {ocrLoading ? <span className="animate-pulse">⏳ OCR…</span> : <><Icon name="scan-line" className="w-4 h-4" /> Reconocer texto</>}
                          </button>
                      </div>
                      <p className="text-[10px] text-center text-slate-500 px-1">
                          Motor: <strong className="text-slate-400">Tesseract.js</strong> (alemán, local). El manuscrito es aproximado; la letra muy ligada o muy pequeña empeora el resultado.
                      </p>
                      {ocrComparePct !== null && (
                          <p className="text-center text-sm font-bold text-emerald-300/95">Coincidencia con el texto modelo (OCR): {ocrComparePct}%</p>
                      )}
                      {ocrHint && <p className="text-xs text-indigo-300/90 text-center">{ocrHint}</p>}
                      {ocrErr && <p className="text-xs text-red-400 text-center bg-red-950/40 rounded-lg px-2 py-1">{ocrErr}</p>}
                      {(ocrText || ocrLoading) && (
                          <div className="rounded-xl border border-indigo-600/40 bg-black/40 p-3">
                              <label className="text-[10px] font-bold text-indigo-300 uppercase tracking-wider">Texto reconocido (editable)</label>
                              <textarea
                                  className="mt-2 w-full min-h-[100px] bg-slate-900/80 border border-white/10 rounded-lg p-2 text-sm text-white font-mono"
                                  value={ocrText}
                                  onChange={(e) => setOcrText(e.target.value)}
                                  placeholder={ocrLoading ? '…' : ''}
                                  readOnly={ocrLoading}
                              />
                          </div>
                      )}
                  </div>
              );
          };

          // Componente de escritura a mano (canvas)
          const HandwritingPad = ({ onClose }) => {
              const canvasRef = useRef(null);
              const [isDrawing, setIsDrawing] = useState(false);
              const [ctx, setCtx] = useState(null);
              useEffect(() => {
                  const canvas = canvasRef.current;
                  if (canvas) {
                      const context = canvas.getContext('2d');
                      context.lineCap = 'round';
                      context.lineJoin = 'round';
                      context.strokeStyle = '#ffffff';
                      context.lineWidth = 4;
                      setCtx(context);
                      const resize = () => { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; };
                      resize();
                      window.addEventListener('resize', resize);
                      return () => window.removeEventListener('resize', resize);
                  }
              }, []);
              const startDrawing = (e) => { e.preventDefault(); setIsDrawing(true); const { offsetX, offsetY } = getCoordinates(e); ctx.beginPath(); ctx.moveTo(offsetX, offsetY); };
              const draw = (e) => { e.preventDefault(); if (!isDrawing) return; const { offsetX, offsetY } = getCoordinates(e); ctx.lineTo(offsetX, offsetY); ctx.stroke(); };
              const stopDrawing = () => { setIsDrawing(false); };
              const getCoordinates = (e) => {
                  const canvas = canvasRef.current;
                  const rect = canvas.getBoundingClientRect();
                  let clientX, clientY;
                  if (e.touches) { clientX = e.touches[0].clientX; clientY = e.touches[0].clientY; }
                  else { clientX = e.clientX; clientY = e.clientY; }
                  return { offsetX: clientX - rect.left, offsetY: clientY - rect.top };
              };
              const clearCanvas = () => { ctx.clearRect(0, 0, canvasRef.current.width, canvasRef.current.height); };
              const saveDrawing = () => {
                  const canvas = canvasRef.current;
                  const image = canvas.toDataURL('image/png');
                  const link = document.createElement('a');
                  link.download = `handwriting_${Date.now()}.png`;
                  link.href = image;
                  link.click();
              };
              return (
                  <div className="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
                      <div className="bg-gray-800 rounded-2xl p-4 max-w-2xl w-full">
                          <h3 className="text-xl font-bold mb-2">✍️ Escritura a mano</h3>
                          <canvas ref={canvasRef} className="handwriting-canvas" onMouseDown={startDrawing} onMouseMove={draw} onMouseUp={stopDrawing} onMouseLeave={stopDrawing} onTouchStart={startDrawing} onTouchMove={draw} onTouchEnd={stopDrawing} />
                          <div className="flex gap-3 mt-4">
                              <button onClick={clearCanvas} className="bg-gray-600 px-4 py-2 rounded-lg">Borrar</button>
                              <button onClick={saveDrawing} className="bg-green-600 px-4 py-2 rounded-lg">Guardar dibujo</button>
                              <button onClick={onClose} className="bg-red-600 px-4 py-2 rounded-lg">Cerrar</button>
                          </div>
                      </div>
                  </div>
              );
          };

          const writingCompareTarget = useMemo(() => {
              if (activeTab !== 'escritura') return null;
              if (writingMode === 'copy') return WRITING_COPY_DRILLS[writingCopyIdx % WRITING_COPY_DRILLS.length];
              if (writingMode === 'dictation') return WRITING_DICTATION_LINES[writingDictIdx % WRITING_DICTATION_LINES.length].de;
              if (writingMode === 'letters') return LETTER_DRILLS[writingLetterIdx % LETTER_DRILLS.length].practice;
              if (writingMode === 'guion' && guionData.length) return guionData[Math.min(writingGuionWriteIdx, guionData.length - 1)]?.text || null;
              if (writingMode === 'vocab' && currentVocabList.length) return currentVocabList[writingVocabIdx % currentVocabList.length].de;
              return null;
          }, [activeTab, writingMode, writingCopyIdx, writingDictIdx, writingLetterIdx, writingGuionWriteIdx, writingVocabIdx, guionData, currentVocabList]);

          const persistDailyPatch = (patch) => {
              const k = 'muller_daily_v1_' + new Date().toISOString().slice(0, 10);
              setDailyChallenges((prev) => {
                  const next = { ...prev, ...patch };
                  try { localStorage.setItem(k, JSON.stringify(next)); } catch (e) {}
                  return next;
              });
          };
          const claimDailyStamp = (key) => {
              if (dailyChallenges[key]) return;
              persistDailyPatch({ [key]: true });
              saveProgress({ coins: userStats.coins + 5, activityByDay: mergeActivityPoints(12) });
          };

          const finishOnboarding = () => {
              try { localStorage.setItem(MULLER_ONBOARDING_KEY, '1'); } catch (e) {}
              setShowOnboarding(false);
              setOnboardingStep(1);
          };

          const sortedDeVoices = useMemo(() => {
              try {
                  return window.speechSynthesis.getVoices()
                      .filter((v) => v.lang && v.lang.toLowerCase().startsWith('de'))
                      .sort((a, b) => (window.__mullerRankVoiceNatural(b) || 0) - (window.__mullerRankVoiceNatural(a) || 0));
              } catch (e) { return []; }
          }, [voicesLoaded, showMullerHub, ttsPrefsEpoch]);
          const sortedEsVoices = useMemo(() => {
              try {
                  return window.speechSynthesis.getVoices()
                      .filter((v) => v.lang && v.lang.toLowerCase().startsWith('es'))
                      .sort((a, b) => (window.__mullerRankVoiceNatural(b) || 0) - (window.__mullerRankVoiceNatural(a) || 0));
              } catch (e) { return []; }
          }, [voicesLoaded, showMullerHub, ttsPrefsEpoch]);

          const oralLeftSec = (mode === 'interview' && oralDeadline)
              ? Math.max(0, Math.ceil((oralDeadline - Date.now()) / 1000))
              : null;
          void oralClock;

          return (
            <div className={`flex flex-col muller-main-fill md:h-screen md:max-h-[850px] w-full font-sans md:rounded-xl overflow-hidden shadow-2xl relative transition-colors duration-500 muller-theme-bg ${themeShellClass} ${uiTheme === 'light' ? 'text-slate-900' : 'text-white'} ${getBgColor()}`}>

              {showSplash && (
                  <div className="fixed inset-0 z-[300] flex flex-col md:flex-row overflow-hidden" role="presentation">
                      <div className="flex-1 min-h-[42vh] md:min-h-0 relative" style={{ background: 'linear-gradient(180deg, #000000 0%, #000000 32%, #DD0000 32%, #DD0000 66%, #FFCE00 66%, #FFCE00 100%)' }} aria-hidden="true" />
                      <div className="flex-1 min-h-[42vh] md:min-h-0 relative border-t md:border-t-0 md:border-l border-white/20" style={{ background: 'linear-gradient(180deg, #AA151B 0%, #AA151B 22%, #F1BF00 22%, #F1BF00 78%, #AA151B 78%, #AA151B 100%)' }} aria-hidden="true" />
                      <div className="absolute inset-0 flex items-center justify-center p-4 sm:p-8 pointer-events-none">
                          <div className="rounded-[2rem] bg-black/50 backdrop-blur-xl border border-white/25 shadow-[0_25px_80px_rgba(0,0,0,0.65)] text-center w-[min(96vw,56rem)] px-8 py-16 sm:px-14 sm:py-20 md:px-20 md:py-24">
                              <h1 className="font-black text-white tracking-tight drop-shadow-[0_4px_24px_rgba(0,0,0,0.55)] leading-none" style={{ fontFamily: 'Outfit, system-ui, sans-serif', fontSize: 'clamp(4.5rem, 22vw, 10rem)' }}>Müller</h1>
                          </div>
                      </div>
                  </div>
              )}
              
              {/* SUPERIOR NAV BAR */}
              <div className="w-full bg-gradient-to-b from-zinc-900/95 via-black/90 to-black/95 backdrop-blur-xl border-b border-white/[0.07] shadow-[0_4px_24px_rgba(0,0,0,0.35)] p-2 md:p-3 pt-[max(0.5rem,env(safe-area-inset-top,0px))] flex flex-col md:flex-row gap-2 md:gap-3 justify-between items-center z-20">
                  <div className="flex gap-1 md:gap-2 bg-zinc-950/80 p-1 rounded-xl ring-1 ring-white/[0.06] w-full md:w-auto overflow-x-auto hide-scrollbar items-center touch-manipulation">
                      <button onClick={()=>{setActiveTab('inicio'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1.5 md:gap-2 px-2.5 md:px-3 py-2 md:py-2 rounded-lg font-bold text-sm md:text-xs min-h-[2.75rem] md:min-h-0 transition ${activeTab === 'inicio' ? 'bg-indigo-600 text-white shadow-[0_0_18px_rgba(79,70,229,0.45)] ring-1 ring-white/20' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon nav name="layout-dashboard" className="w-3 h-3 md:w-4 md:h-4" /> Inicio</button>
                      <ExerciseHelpBtn helpId="nav_inicio" compact />
                      <button onClick={()=>{setActiveTab('historia'); setMode('dialogue'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1.5 md:gap-2 px-2.5 md:px-3 py-2 md:py-2 rounded-lg font-bold text-sm md:text-xs min-h-[2.75rem] md:min-h-0 transition ${activeTab === 'historia' ? 'bg-blue-600 text-white shadow-[0_0_20px_rgba(37,99,235,0.35)] ring-1 ring-white/20' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon nav name="play" className="w-3 h-3 md:w-4 md:h-4" /> Historia</button>
                      <ExerciseHelpBtn helpId="nav_historia" compact />
                      <button onClick={()=>{setActiveTab('shadowing'); stopAudio(); setPracticeActive(null);}} className={`flex items-center gap-1.5 md:gap-2 px-2.5 md:px-3 py-2 md:py-2 rounded-lg font-bold text-sm md:text-xs min-h-[2.75rem] md:min-h-0 transition ${activeTab === 'shadowing' ? 'bg-teal-600 text-white shadow-[0_0_18px_rgba(13,148,136,0.45)] ring-1 ring-white/20' : 'text-gray-400 hover:text-white whitespace-nowrap'}`}><Icon nav name="audio-lines" className="w-3 h-3 md:w-4 md:h-4" /> Shadowing</button>
                      <ExerciseHelpBtn helpId="nav_shadowing" compact />

              {pwaDeferredPrompt && (

        // ========== COMPONENTES FLOTANTES (Sincronización y Permiso Micrófono) ==========
        function FloatingButtons() {
            const requestMicPermission = async () => {
                try {
                    await navigator.mediaDevices.getUserMedia({ audio: true });
                    alert('✅ Permiso de micrófono concedido. Ya puedes usar el reconocimiento de voz.');
                } catch (err) {
                    alert('❌ No se pudo obtener permiso del micrófono. Asegúrate de que tu navegador tenga acceso.');
                }
            };

            const exportData = () => {
                const allLocalData = {};
                for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key) continue;
                    allLocalData[key] = localStorage.getItem(key);
                }
                const backupTimestamp = new Date().toISOString();
                localStorage.setItem('muller_last_backup_iso', backupTimestamp);
                setLastBackupIso(backupTimestamp);
                const dataToExport = {
                    allLocalStorage: allLocalData,
                    version: '4.0',
                    exportDate: backupTimestamp
                };
                const blob = new Blob([JSON.stringify(dataToExport, null, 2)], {type: 'application/json'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `muller_progreso_${new Date().toISOString().slice(0,19)}.json`;
                a.click();
                URL.revokeObjectURL(url);
                alert('✅ Backup total exportado. Guarda este archivo en Drive para sincronizar todos tus dispositivos.');
            };

            const importData = (event) => {
                const file = event.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const data = JSON.parse(e.target.result);
                        if (data.type === 'muller_partial_v1' && data.part === 'srs') {
                            localStorage.setItem('muller_vocab_srs_v1', JSON.stringify(data.muller_vocab_srs_v1 || {}));
                            alert('✅ SRS importado. Recarga la página.');
                            window.location.reload();
                            return;
                        }
                        if (data.type === 'muller_partial_v1' && data.part === 'decks') {
                            const cur = JSON.parse(localStorage.getItem('mullerStats') || '{}');
                            const merged = { ...cur, difficultVocab: data.difficultVocab || cur.difficultVocab, normalVocab: data.normalVocab || cur.normalVocab, difficultGrammar: data.difficultGrammar || cur.difficultGrammar };
                            localStorage.setItem('mullerStats', JSON.stringify(merged));
                            alert('✅ Mazos importados. Recarga la página.');
                            window.location.reload();
                            return;
                        }
                        if (data.allLocalStorage && typeof data.allLocalStorage === 'object') {
                            localStorage.clear();
                            Object.entries(data.allLocalStorage).forEach(([key, value]) => {
                                localStorage.setItem(key, value);
                            });
                            setLastBackupIso(localStorage.getItem('muller_last_backup_iso'));
                        } else if (data.allMullerData && typeof data.allMullerData === 'object') {
                            Object.entries(data.allMullerData).forEach(([key, value]) => {
                                localStorage.setItem(key, value);
                            });
                            setLastBackupIso(localStorage.getItem('muller_last_backup_iso'));
                        } else {
                            if (data.userStats) localStorage.setItem('mullerStats', JSON.stringify(data.userStats));
                            if (data.savedScripts) localStorage.setItem('mullerScripts', JSON.stringify(data.savedScripts));
                            if (data.customVocabLessons) localStorage.setItem('mullerCustomVocab', JSON.stringify(data.customVocabLessons));
                        }
                        alert('✅ Datos importados correctamente. Recarga la página para ver los cambios.');
                        window.location.reload();
                    } catch(err) { alert('❌ Archivo inválido'); }
                };
                reader.readAsText(file);
            };

            const exportSrsOnly = () => {
                try {
                    const raw = localStorage.getItem('muller_vocab_srs_v1');
                    const map = raw ? JSON.parse(raw) : {};
                    const payload = { type: 'muller_partial_v1', part: 'srs', muller_vocab_srs_v1: map, exportDate: new Date().toISOString() };
                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `muller_srs_only_${new Date().toISOString().slice(0, 19)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    alert('✅ Exportado solo SRS (muller_vocab_srs_v1).');
                } catch (err) { alert('❌ No se pudo exportar SRS'); }
            };

            const exportDecksOnly = () => {
                try {
                    const stats = JSON.parse(localStorage.getItem('mullerStats') || '{}');
                    const payload = {
                        type: 'muller_partial_v1',
                        part: 'decks',
                        exportDate: new Date().toISOString(),
                        difficultVocab: stats.difficultVocab || [],
                        normalVocab: stats.normalVocab || [],
                        difficultGrammar: stats.difficultGrammar || []
                    };
                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `muller_mazos_${new Date().toISOString().slice(0, 19)}.json`;
                    a.click();
                    URL.revokeObjectURL(url);
                    alert('✅ Exportados mazos (difícil / normal / gramática).');
                } catch (err) { alert('❌ No se pudo exportar mazos'); }
            };

            const showSyncHelp = () => {
                alert(
                    "🔄 Sincronización TOTAL gratis:\n\n" +
                    "1) En tu dispositivo actual pulsa Exportar.\n" +
                    "2) Sube el archivo .json a Google Drive.\n" +
                    "3) En otro dispositivo descarga ese .json.\n" +
                    "4) Pulsa Importar en la app.\n" +
                    "5) Recarga la página.\n\n" +
                    "Esto copia TODO el estado guardado de la aplicación."
                );
            };

            const [lastBackupIso, setLastBackupIso] = React.useState(() => localStorage.getItem('muller_last_backup_iso'));
            const backupAgeDays = lastBackupIso ? Math.floor((Date.now() - new Date(lastBackupIso).getTime()) / (1000 * 60 * 60 * 24)) : null;

            return (
                <>
                    <button onClick={requestMicPermission} className="fixed bottom-20 right-4 z-50 bg-gradient-to-br from-emerald-500 to-green-700 hover:from-emerald-400 hover:to-green-600 text-white p-3 rounded-full float-icon-glow ring-2 ring-white/10" title="Solicitar permiso de micrófono">
                        <Icon name="mic" className="w-6 h-6" />
                    </button>
                    <div className="fixed bottom-36 right-4 z-50 flex flex-col gap-2">
                        {backupAgeDays !== null && (
                            <div className="bg-black/70 text-[10px] text-gray-200 px-2 py-1 rounded-lg border border-gray-700 text-center">
                                Backup: hace {Math.max(0, backupAgeDays)} d
                            </div>
                        )}
                        <button onClick={showSyncHelp} className="bg-gradient-to-br from-teal-500 to-teal-900 hover:from-teal-400 hover:to-teal-800 text-white p-3 rounded-full float-icon-glow ring-2 ring-white/10" title="Guía sincronización total">
                            <Icon name="info" className="w-6 h-6" />
                        </button>
                        <button onClick={exportData} className="bg-gradient-to-br from-sky-500 to-blue-800 hover:from-sky-400 hover:to-blue-700 text-white p-3 rounded-full float-icon-glow ring-2 ring-white/10" title="Exportar progreso">
                            <Icon name="download" className="w-6 h-6" />
                        </button>

const DEFAULT_PLURALS = [
    { singular: "der Tisch", plural: "die Tische", regla: "+e" },
    { singular: "die Lampe", plural: "die Lampen", regla: "+n" },
    { singular: "das Buch", plural: "die Bücher", regla: "¨+er" }
];
const DEFAULT_VERBPREP = [
    { verbo: "warten", preposicion: "auf", ejemplo: "Ich warte auf den Bus." },
    { verbo: "sich interessieren", preposicion: "für", ejemplo: "Ich interessiere mich für Kunst." },
    { verbo: "denken", preposicion: "an", ejemplo: "Ich denke an dich." }
];
const DEFAULT_PREPOSITIONS = [
    { preposicion: "aus", caso: "Dativ", ejemplo: "Ich komme aus Spanien." },
    { preposicion: "für", caso: "Akkusativ", ejemplo: "Das Geschenk ist für dich." },
    { preposicion: "in", caso: "Wechsel", ejemplo: "Ich bin in der Stadt (Dativ) / Ich gehe in die Stadt (Akkusativ)." }
];

// -------------------- EXTRACTORES (guardan en localStorage) --------------------
function extractPluralsFromGuion(guionData, scriptTitle) {
    if (!guionData || !Array.isArray(guionData)) return;
    let existing = JSON.parse(localStorage.getItem('muller_extracted_plurals') || '[]');
    guionData.forEach(scene => {
        const text = scene.text;
        const matches = text.match(/\bdie\s+([A-ZÄÖÜ][a-zäöüß]+(?:e|er|en|n|s)?)\b/g) || [];
        matches.forEach(m => {
            const plural = m.replace('die ', '');
            let singular = plural.replace(/[äöü]/g, c => ({'ä':'a','ö':'o','ü':'u'}[c]));
            singular = singular.replace(/(e|er|n|en|s)$/, '');
            if (singular && !existing.find(p => p.plural === plural)) {
                existing.push({ singular, plural, example: text, scriptTitle, regla: 'extraído' });
            }
        });
    });
    localStorage.setItem('muller_extracted_plurals', JSON.stringify(existing));
}

function extractVerbPrepsFromGuion(guionData, scriptTitle) {
    let existing = JSON.parse(localStorage.getItem('muller_extracted_verbprep') || '[]');
    const patterns = DEFAULT_VERBPREP.map(v => ({ verbo: v.verbo, prep: v.preposicion }));
    guionData.forEach(scene => {
        const text = scene.text;
        patterns.forEach(p => {
            if (text.includes(p.verbo) && text.includes(p.prep)) {
                if (!existing.find(v => v.verbo === p.verbo)) {
                    existing.push({ ...p, ejemplo: text, scriptTitle });
                }
            }
        });
    });
    localStorage.setItem('muller_extracted_verbprep', JSON.stringify(existing));
}

function extractPrepositionsFromGuion(guionData, scriptTitle) {
    let existing = JSON.parse(localStorage.getItem('muller_extracted_prepositions') || '[]');
    guionData.forEach(scene => {
        const text = scene.text;
        DEFAULT_PREPOSITIONS.forEach(p => {
            if (text.includes(p.preposicion)) {
                if (!existing.find(pr => pr.preposicion === p.preposicion)) {
                    existing.push({ ...p, example: text, scriptTitle });
                }
            }
        });
    });
    localStorage.setItem('muller_extracted_prepositions', JSON.stringify(existing));
}

function extractArticlesFromGuionFinal(guionData, scriptTitle) {
    if (!guionData || !Array.isArray(guionData)) return;
    const corrections = JSON.parse(localStorage.getItem('muller_article_corrections') || '{}');
    let existing = JSON.parse(localStorage.getItem('muller_extracted_articles') || '[]');
    const regex = /\b(Der|Die|Das|Ein|Eine)\s+([A-ZÄÖÜ][a-zäöüß]+)\s+(ist|sind|hat|haben|kann|muss|will|möchte|kommt|geht|steht|liegt|sitzt|arbeitet|spricht|denkt|findet|glaubt|weiß|sieht|hört|fährt|läuft|bringt|nimmt|gibt|hilft|trifft|schläft|wäscht|trägt|verliert|schreibt|liest|kennt|nennt)\b/gi;
    guionData.forEach(scene => {
        const text = scene.text || '';
        let match;
        while ((match = regex.exec(text)) !== null) {
            const articleRaw = match[1].toLowerCase();
            const noun = match[2];
            let finalArticle = corrections[noun];
            if (!finalArticle) {
                const found = existing.find(item => item.word === noun);
                if (found) finalArticle = found.article;
            }
            if (!finalArticle) {
                if (noun.toLowerCase().endsWith('ung') || noun.toLowerCase().endsWith('heit') || noun.toLowerCase().endsWith('keit')) finalArticle = 'die';
                else if (noun.toLowerCase().endsWith('chen') || noun.toLowerCase().endsWith('lein')) finalArticle = 'das';
                else if (noun.toLowerCase().endsWith('er') || noun.toLowerCase().endsWith('ling')) finalArticle = 'der';
                else finalArticle = articleRaw === 'ein' ? 'der' : articleRaw === 'eine' ? 'die' : articleRaw;
            }
            if (finalArticle && noun.length > 1 && !existing.find(item => item.word === noun)) {
                existing.push({
                    word: noun, article: finalArticle,
                    examples: [text], translation: scene.translation || '',
                    scriptTitle, dateAdded: new Date().toISOString(),
                    inferred: !corrections[noun]
                });
            }
        }
    });
    localStorage.setItem('muller_extracted_articles', JSON.stringify(existing));
}

function calculateStreak(daysMap) {
    let streak = 0;
    const cursor = new Date();
    while (true) {
        const dateKey = cursor.toISOString().slice(0, 10);
        const count = daysMap[dateKey]?.attempts || 0;
        if (count <= 0) break;
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
    }
    return streak;
}

    return base + " (TELC: prioriza colocaciones frecuentes en B1/B2.)";
}

function buildAdaptiveQueue(items, progress, getId, maxItems = 120) {
    const weighted = items.map((item) => {
        const id = getId(item);
        const stats = progress[id] || {};
        const attempts = stats.attempts || 0;
        const errors = stats.errors || 0;
        const difficult = stats.difficult || 0;
        const easy = stats.easy || 0;
        const consecutiveErrors = stats.consecutiveErrors || 0;
        const lastSeenAt = stats.lastSeenAt ? new Date(stats.lastSeenAt).getTime() : 0;
        const hoursSinceSeen = lastSeenAt ? Math.max(0, (Date.now() - lastSeenAt) / (1000 * 60 * 60)) : 72;
        const recencyBoost = Math.min(3, hoursSinceSeen / 24);
        const score = attempts === 0
            ? 5
            : 2 + (errors * 2.2) + (difficult * 1.4) + (consecutiveErrors * 1.8) + recencyBoost - (easy * 0.7);
        return { item, score: Math.max(0.5, score + Math.random()) };
    });
    weighted.sort((a, b) => b.score - a.score);
    return weighted.slice(0, Math.min(maxItems, weighted.length)).map(entry => entry.item);
}

function getProgressCounts(progress, prefix) {
    const entries = Object.entries(progress).filter(([key]) => key.startsWith(prefix + '::'));
    return entries.reduce((acc, [, stats]) => {
        acc.total += 1;
        acc.attempts += stats.attempts || 0;
        acc.errors += stats.errors || 0;
        acc.easy += stats.easy || 0;
        acc.normal += stats.normal || 0;
        acc.difficult += stats.difficult || 0;
        if ((stats.errors || 0) > (stats.correct || 0)) acc.weak += 1;
        return acc;
    }, { total: 0, attempts: 0, errors: 0, easy: 0, normal: 0, difficult: 0, weak: 0 });
}

function filterQueueByMode(items, progress, getId, mode) {
    if (mode === 'smart') return items;
    return items.filter((item) => {
        const stats = progress[getId(item)] || {};
        const errors = stats.errors || 0;
        const correct = stats.correct || 0;
        const difficult = stats.difficult || 0;
        const attempts = stats.attempts || 0;
        if (mode === 'failed') return errors > 0;
        if (mode === 'difficult') return difficult > 0 || errors > 0;
        if (mode === 'weak') return attempts >= 3 && (errors / Math.max(1, errors + correct)) >= 0.4;
        if (mode === 'new') return attempts === 0;
        return true;
    });
}

function getAdvancedDashboard() {
    const progress = getAdvancedProgress();
    const daily = getDailyActivity();
    const today = getTodayISODate();
    const todayAttempts = daily.days[today]?.attempts || 0;
    const dailyGoal = daily.dailyGoal || DAILY_GOAL_DEFAULT;
    const art = getProgressCounts(progress, 'articulos');
    const verb = getProgressCounts(progress, 'verbos');
    const prep = getProgressCounts(progress, 'preposiciones');
    const totalAttempts = art.attempts + verb.attempts + prep.attempts;
    const totalErrors = art.errors + verb.errors + prep.errors;
    const accuracy = totalAttempts > 0 ? Math.round(((totalAttempts - totalErrors) / totalAttempts) * 100) : 0;
    return {
        art, verb, prep, totalAttempts, totalErrors, accuracy,
        weak: art.weak + verb.weak + prep.weak,
        todayAttempts,
        dailyGoal,
        dailyProgress: Math.min(100, Math.round((todayAttempts / Math.max(1, dailyGoal)) * 100)),
        streakDays: calculateStreak(daily.days)
    };
}

function ArticlePracticeFinal({ onBack, examCtx, setExamCtx, examAutoLevel }) {
    const [mode, setMode] = React.useState(null);
    const [queue, setQueue] = React.useState([]);
    const [feedback, setFeedback] = React.useState(null);
    const [loading, setLoading] = React.useState(() => !!(examCtx && examAutoLevel));
    const [progressMap, setProgressMap] = React.useState(() => getAdvancedProgress());
    const [queueFilter, setQueueFilter] = React.useState('smart');
    const [showTranslation, setShowTranslation] = React.useState(false);
    const examLoadRef = React.useRef(false);

    // 🧠 Persistencia de palabras dominadas (Cerebro de Oro)
    const [masteredArticles, setMasteredArticles] = React.useState(() => {
        const saved = localStorage.getItem('muller_mastered_articles');
        return saved ? JSON.parse(saved) : [];
    });

    const loadData = (selectedMode) => {
        setMode(selectedMode);
        setLoading(true);
        
        const processData = (data) => {
            let filtered = data;
            if (selectedMode !== 'MIXTO' && selectedMode !== 'historia') {
                filtered = data.filter(item => item.level === selectedMode);
            }
            // Müller-Filter: Eliminamos lo que ya te sabes para siempre
            const finalQueue = filtered.filter(item => !masteredArticles.includes(item.de));
            
            if (finalQueue.length === 0) {
                alert(`¡Increíble! Ya dominas todo el mazo ${selectedMode}. 🏆`);
                if (examCtx) onBack();
                else setMode(null);
            } else {
                const getId = (item) => `articulos::${item.de}`;
                const adaptive = buildAdaptiveQueue(finalQueue, progressMap, getId);
                const filtered = filterQueueByMode(adaptive, progressMap, getId, queueFilter);
                setQueue(filtered.length > 0 ? filtered : adaptive);
            }
            setLoading(false);
        };

        if (selectedMode === 'historia') {
            const allVocab = window.__DEFAULT_GUION__?.flatMap(s => s.vocab || []) || [];
            const nouns = allVocab.filter(v => /^(der|die|das)\s/i.test(v.de));
            const uniqueNouns = [...new Map(nouns.map(item => [item.de, item])).values()];
            processData(uniqueNouns);
        } else {
            const GIST_URL = "https://gist.githubusercontent.com/djplaza1/a53fde18c901a7f2d86977174b5b9a72/raw/articulos.json?nocache=" + new Date().getTime();
            fetch(GIST_URL).then(res => res.json()).then(processData).catch(() => {
                alert("Error de conexión con la base de datos Müller.");
                if (examCtx) onBack();
                else {
                    setMode(null);
                    setLoading(false);
                }
            });
        }

    React.useEffect(() => {
        if (examCtx && examAutoLevel && !examLoadRef.current) {
            examLoadRef.current = true;
            loadData(examAutoLevel);
        }
    }, [examCtx, examAutoLevel]);

        const id = queue[0]?.de;
        if (id) setShowTranslation(false);

            updatedAt: new Date().toISOString()
        };
        const merged = { ...progressMap, [id]: next };

        saveAdvancedProgress(merged);
        handleNextWord();
